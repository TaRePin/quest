<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<title>アルディア・ファンタジー</title>
<style>
  :root{ --ink:#fff; --hp:#e85d5d; --mp:#5d9ce8; --gold:#f5d76e; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'DotGothic16',monospace;background:#000;color:var(--ink);
       overflow:hidden;user-select:none;-webkit-user-select:none;}
  #app{max-width:440px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;
       background:#000;position:relative;}

  #title{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;
         align-items:center;justify-content:center;text-align:center;padding:24px;
         background:linear-gradient(180deg,#0c1838 0%,#13234d 60%,#0a1430 100%);}
  .t-logo{position:relative;margin-bottom:6px;}
  .t-dragon{position:absolute;left:50%;top:-26px;width:200px;height:150px;
            transform:translateX(-58%);opacity:.92;
            filter:drop-shadow(0 3px 4px rgba(0,0,0,.6));pointer-events:none;}
  .t-jp{font-size:13px;color:#9bd;letter-spacing:.32em;margin:6px 0 0;}
  .t-speed{margin-top:26px;}
  .t-speed-label{font-size:12px;color:#cdb78a;letter-spacing:.22em;margin-bottom:6px;}
  .t-speed-row{display:flex;gap:14px;justify-content:center;font-size:14px;color:#e8e2cf;letter-spacing:.08em;}
  .t-spd{position:relative;padding-left:14px;cursor:pointer;}
  .t-copy{position:absolute;bottom:22px;left:0;right:0;font-size:13px;color:#b9a7ff;letter-spacing:.12em;}
  .t-ver{color:#7e8bb5;font-size:11px;}
  .t-update{margin-top:22px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .t-upbtn{font-size:12px;color:#9fc0ff;letter-spacing:.12em;border:1px solid #3a4a72;
    border-radius:6px;padding:5px 12px;cursor:pointer;background:rgba(20,32,64,.5);}
  .t-upbtn:active{background:#2a4;color:#fff;}
  .t-upmsg{font-size:11px;color:#cdb78a;min-height:14px;letter-spacing:.06em;}
  .t-bar{width:200px;height:8px;border:1px solid #5a6a9a;border-radius:5px;background:#0a1228;
    overflow:hidden;opacity:0;transition:opacity .2s;}
  .t-bar.show{opacity:1;}
  .t-bar i{display:block;height:100%;width:0;
    background:linear-gradient(90deg,#3a7,#6cf);border-radius:5px;}
  #devStartBtn{position:absolute;right:8px;bottom:8px;width:26px;height:26px;border-radius:50%;
    cursor:pointer;opacity:.10;background:radial-gradient(circle,#6cf,#357);z-index:31;
    transition:opacity .2s;}
  #devStartBtn:active{opacity:.6;}
  #devStartBtn2{position:absolute;left:8px;bottom:8px;width:26px;height:26px;border-radius:50%;
    cursor:pointer;opacity:.10;background:radial-gradient(circle,#fc6,#a63);z-index:31;
    transition:opacity .2s;}
  #devStartBtn2:active{opacity:.6;}
  #devStartBtn.holding,#devStartBtn2.holding{animation:devHold 5s linear forwards;}
  @keyframes devHold{from{opacity:.1;box-shadow:0 0 0 rgba(255,255,255,0);}
    to{opacity:.95;box-shadow:0 0 16px rgba(255,255,255,.9);}}
  #credits{display:none;position:absolute;inset:0;z-index:50;background:#000;overflow:hidden;}
  #credits.show{display:block;}
  #creditsInner{position:absolute;left:0;right:0;top:100%;text-align:center;color:#eaf2ff;
    font-family:Georgia,'Times New Roman',serif;line-height:1.9;padding:0 18px;}
  #creditsInner.run{animation:creditScroll 48s linear forwards;}
  #creditsInner h1{font-size:26px;letter-spacing:3px;margin:0 0 6px;color:#ffe7a0;}
  #creditsInner h2{font-size:13px;letter-spacing:6px;margin:0 0 40px;color:#9fc0ff;font-weight:400;}
  #creditsInner .role{font-size:11px;letter-spacing:3px;color:#7fa0d0;margin-top:30px;}
  #creditsInner .name{font-size:17px;letter-spacing:1px;margin-top:3px;}
  #creditsInner .fin{font-size:30px;letter-spacing:8px;color:#ffe7a0;margin:60px 0 120px;}
  .theend{font-size:46px;letter-spacing:14px;color:#ffe7a0;text-shadow:0 0 24px rgba(255,231,160,.7);
    animation:theEndIn 2.4s ease-out forwards;}
  @keyframes theEndIn{0%{opacity:0;transform:scale(.4);letter-spacing:2px;}
    60%{opacity:1;}100%{opacity:1;transform:scale(1);letter-spacing:14px;}}
  .endhint{margin-top:40px;font-size:13px;letter-spacing:3px;color:#9fc0ff;
    animation:bl 1.2s steps(1) infinite;font-family:inherit;}
  @keyframes creditScroll{from{top:100%;}to{top:-380%;}}
  @keyframes bl{50%{opacity:0;}}

  #stage{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;}
  canvas{display:block;background:#000;image-rendering:pixelated;}

  #strip{display:none;padding:6px 10px;font-size:12px;border-bottom:2px solid #fff;
         background:#000;flex-direction:column;gap:3px;}
  #strip.show{display:flex;}
  .strip-top{display:flex;align-items:center;justify-content:space-between;}
  .strip-bars{display:flex;gap:6px;}
  .s-cell{white-space:nowrap;} .s-cell b{color:var(--gold);}
  .hp-n{color:var(--hp);} .mp-n{color:var(--mp);}
  .hbar{height:7px;border:1px solid #fff;background:#000;border-radius:2px;overflow:hidden;}
  .hbar i{display:block;height:100%;transition:width .3s;}
  .hbar.hp i{background:linear-gradient(90deg,#7a201a,var(--hp));}
  /* バーサーカー：HP75%以下で橙、30%以下(fury発動圏)で燃える赤＋点滅 */
  .hbar.hp.fury-warn i{background:linear-gradient(90deg,#7a4a10,#ffae3a);}
  .hbar.hp.fury-on i{background:linear-gradient(90deg,#7a1010,#ff5a2a);animation:furyPulse .6s steps(1) infinite;}
  @keyframes furyPulse{0%{filter:brightness(1);}50%{filter:brightness(1.7);}100%{filter:brightness(1);}}
  .fury-badge{color:#ff7a2a;font-size:10px;font-weight:bold;animation:furyPulse .6s steps(1) infinite;}
  .hbar.mp i{background:linear-gradient(90deg,#26406e,var(--mp));}
  #bHero{position:absolute;left:8px;top:10px;z-index:6;font-size:12px;line-height:1.55;padding:6px 10px;min-width:128px;}
  #bHero .lbl{color:var(--gold);font-size:11px;letter-spacing:.12em;}

  .win{border:3px solid #fff;border-radius:8px;background:#000;padding:11px 14px;
       line-height:1.85;font-size:15px;box-shadow:0 0 0 3px #000,inset 0 0 0 2px #000;
       outline:2px solid #000;outline-offset:1px;}
  .t-name{position:relative;z-index:1;font-size:46px;font-weight:bold;letter-spacing:.04em;line-height:1.05;
          color:#cfd6e0;
          text-shadow:1px 1px 0 #6b7280,2px 2px 0 #565d68,3px 3px 0 #444a54,
                      4px 4px 0 #353a42,5px 5px 0 #262a30,6px 7px 6px rgba(0,0,0,.7);
          transform:perspective(500px) rotateX(12deg);}
  .t-menu{margin-top:30px;display:flex;flex-direction:column;gap:8px;}
  .t-item{position:relative;font-size:22px;letter-spacing:.12em;color:#eee;padding-left:26px;cursor:pointer;}
  .t-cur{position:absolute;left:4px;opacity:0;color:#ffe06a;}
  .t-item.sel .t-cur,.t-spd.sel .t-cur{opacity:1;animation:bl 1s steps(1) infinite;}
  .t-spd.sel{color:#ffe06a;}
  /* 敵の攻撃モーション（前に飛び出す）参考: web帳 */
  .b-enemy.atk{animation:eatk .5s;}
  @keyframes eatk{0%,100%{transform:translateY(0) scale(1);}45%{transform:translateY(40px) scale(1.35);}}
  @keyframes bhit{0%,100%{transform:translate(0,0);opacity:1;}25%{transform:translate(-10px,0);opacity:.35;}75%{transform:translate(8px,0);}}
  @keyframes bdead{to{opacity:0;transform:scale(.4) translateY(20px);filter:blur(4px);}}
  #msgBox{position:absolute;left:8px;right:8px;bottom:8px;z-index:20;display:none;min-height:84px;}
  #msgBox.show{display:block;}
  #msgText{white-space:pre-wrap;}
  .msg-cursor{color:#fff;animation:bl 1s steps(1) infinite;}
  #cmdBox{position:absolute;right:8px;bottom:100px;z-index:21;display:none;min-width:128px;}
  #cmdBox.show{display:block;}
  .cmd-item{padding:3px 8px 3px 20px;position:relative;cursor:pointer;font-size:15px;}
  .cmd-item.sel::before{content:"▶";position:absolute;left:4px;}
  .cmd-item:active{color:var(--gold);}

  #pad{display:none;padding:10px 16px 18px;align-items:center;justify-content:space-between;
       background:#000;border-top:2px solid #333;}
  #pad.show{display:flex;}
  .dpad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);gap:3px;
        touch-action:none;user-select:none;-webkit-user-select:none;}
  .dbtn{background:#1a1a1a;border:2px solid #555;border-radius:6px;color:#ccc;font-size:20px;
        display:flex;align-items:center;justify-content:center;cursor:pointer;
        pointer-events:none;transition:background .05s,border-color .05s;}
  .dbtn:active,.dbtn.pressed{background:#2a4;color:#fff;border-color:#5d8;}
  .dbtn.empty{visibility:hidden;}
  .act-col{display:flex;flex-direction:column;gap:10px;}
  .abtn{width:60px;height:60px;border-radius:50%;border:3px solid #888;background:#1a1a1a;color:#fff;
        font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .abtn:active{background:#2a4;}
  .abtn.menu{width:48px;height:48px;font-size:11px;border-color:#666;align-self:center;}

  #battle{position:absolute;inset:0;z-index:25;display:none;flex-direction:column;
          background:linear-gradient(180deg,#0a0e1c 0%,#141a30 55%,#0a0e1c 100%);}
  #battle.show{display:flex;}
  /* 戦闘背景テーマ */
  #battle[data-bg="field"]{background:linear-gradient(180deg,#1a2a52 0%,#2a4a82 38%,#3a6a3e 38%,#1e3a22 100%);}
  #battle[data-bg="cave"]{background:linear-gradient(180deg,#0a0808 0%,#1a1410 45%,#241a14 45%,#0f0a08 100%);}
  #battle[data-bg="castle"]{background:linear-gradient(180deg,#12101e 0%,#241c38 45%,#2a2230 45%,#14101a 100%);}
  #battle[data-bg="tower"]{background:linear-gradient(180deg,#160a26 0%,#2a1648 42%,#3a2058 42%,#190c2c 100%);}
  #battle[data-bg="elf"]{background:linear-gradient(180deg,#0d1b3a 0%,#12305a 36%,#1d4a2e 36%,#0f2c18 100%);}
  #battle[data-bg="elf"] .b-far{
    background:radial-gradient(80px 54px at 18% 100%,#16331f 0 99%,transparent),
              radial-gradient(100px 64px at 50% 100%,#1c3e26 0 99%,transparent),
              radial-gradient(86px 56px at 82% 100%,#16331f 0 99%,transparent);opacity:.75;}
  #battle[data-bg="elf"]::after{content:"";position:absolute;top:9%;right:16%;width:40px;height:40px;border-radius:50%;
    background:radial-gradient(circle,#f4f9ff,#cfe2ff);box-shadow:0 0 26px rgba(200,225,255,.55);z-index:0;}
  .b-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  /* 遠景の山・星・岩などをレイヤーで */
  .b-far{position:absolute;left:0;right:0;top:24%;height:18%;z-index:1;opacity:.5;pointer-events:none;}
  #battle[data-bg="field"] .b-far{
    background:radial-gradient(60px 40px at 20% 100%,#1e3a22 0 99%,transparent),
              radial-gradient(80px 52px at 50% 100%,#234227 0 99%,transparent),
              radial-gradient(70px 46px at 80% 100%,#1e3a22 0 99%,transparent);}
  #battle[data-bg="field"]::after{content:"";position:absolute;top:8%;right:14%;width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle,#fff7d0,#ffe28a);box-shadow:0 0 30px rgba(255,226,138,.6);z-index:0;}
  #battle[data-bg="cave"] .b-far{
    background:radial-gradient(40px 60px at 15% 0,#2a201a 0 99%,transparent),
              radial-gradient(34px 70px at 45% 0,#241a14 0 99%,transparent),
              radial-gradient(40px 54px at 78% 0,#2a201a 0 99%,transparent);opacity:.7;}
  #battle[data-bg="castle"] .b-far{
    background:linear-gradient(90deg,transparent 8%,#2e2640 8% 14%,transparent 14% 24%,#2e2640 24% 30%,transparent 30% 70%,#2e2640 70% 76%,transparent 76% 86%,#2e2640 86% 92%,transparent 92%);
    top:20%;height:22%;opacity:.6;}
  #battle[data-bg="tower"] .b-far{
    background:linear-gradient(90deg,transparent 10%,#4a2e6e 10% 16%,transparent 16% 42%,#4a2e6e 42% 48%,transparent 48% 58%,#4a2e6e 58% 64%,transparent 64% 90%);
    top:18%;height:24%;opacity:.55;}
  #battle[data-bg="tower"]::after{content:"";position:absolute;top:10%;left:18%;width:5px;height:5px;border-radius:50%;
    background:#e6d0ff;box-shadow:60px 14px 0 #cdaaff,120px -4px 0 #fff,180px 24px 0 #d8b8ff,240px 6px 0 #fff,300px 18px 0 #cdaaff;
    opacity:.8;z-index:0;}
  .b-grid{position:absolute;left:0;right:0;bottom:0;height:55%;z-index:1;
    background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
    background-size:30px 22px;transform:perspective(280px) rotateX(60deg);transform-origin:bottom;opacity:.5;}
  #bEnemies{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:center;gap:14px;flex-wrap:wrap;padding-top:20px;}
  .b-unit{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .1s;}
  .b-unit.targetable{outline:2px dashed rgba(255,211,77,.7);outline-offset:4px;border-radius:8px;}
  .b-unit .b-art{line-height:1;filter:drop-shadow(0 8px 14px rgba(0,0,0,.7));
    display:flex;align-items:flex-end;justify-content:center;}
  .b-unit.hit .b-art{animation:bhit .3s;}
  .b-unit.atk .b-art{animation:eatk .5s;}
  .b-unit.dead{animation:bdead .6s forwards;}
  .b-unit .b-uname{font-size:11px;margin-top:6px;letter-spacing:.05em;color:#ffe;
    position:relative;z-index:3;background:rgba(0,0,0,.55);padding:1px 7px;border-radius:7px;
    white-space:nowrap;text-shadow:0 1px 2px #000;}
  .b-unit .b-uhp{width:70px;margin-top:3px;position:relative;z-index:3;}
  .b-unit .b-uhp .bar{height:6px;border:1px solid #fff;background:#000;border-radius:2px;overflow:hidden;}
  .b-unit .b-uhp .bar i{display:block;height:100%;background:linear-gradient(90deg,#7a201a,var(--hp));transition:width .3s;}
  #bParty{position:absolute;left:8px;top:8px;z-index:6;display:flex;flex-direction:column;gap:4px;}
  .p-unit{font-size:11px;line-height:1.3;padding:4px 8px;border:2px solid #fff;border-radius:5px;background:#000;min-width:118px;}
  .p-unit.active{border-color:var(--gold);box-shadow:0 0 6px rgba(245,215,94,.6);}
  .p-unit.downed{opacity:.45;}
  .p-unit .pn{color:var(--gold);}
  .p-unit .pn-lv{color:#bfe3ff;font-size:10px;font-weight:bold;}
  .p-unit .hbar{margin-top:2px;}
  #bAuto{position:absolute;right:8px;top:8px;z-index:7;font-size:12px;padding:5px 10px;border:2px solid #888;border-radius:5px;background:#000;cursor:pointer;letter-spacing:.08em;}
  #bAuto.on{border-color:var(--gold);color:var(--gold);box-shadow:0 0 6px rgba(245,215,94,.5);}
  #bMsg{position:absolute;left:8px;right:8px;bottom:118px;z-index:5;min-height:60px;}
  #bCmd{position:absolute;left:8px;bottom:8px;width:150px;z-index:5;}
  #bSub{position:absolute;right:8px;bottom:8px;left:166px;z-index:5;max-height:200px;overflow-y:auto;}

  /* battle FX */
  .fx{position:absolute;z-index:4;pointer-events:none;}
  .fx-dmg{font-size:34px;font-weight:bold;color:#ffd34d;text-shadow:2px 2px 0 #000;animation:dmgrise 1s ease-out forwards;}
  .fx-dmg.crit{color:#ff5a4d;font-size:44px;}
  .fx-dmg.heal{color:#7ee87e;}
  .fx-dmg.miss{color:#cfd6e0;font-size:26px;}
  @keyframes dmgrise{0%{opacity:1;transform:translate(-50%,0) scale(.6);}30%{transform:translate(-50%,-10px) scale(1.1);}100%{opacity:0;transform:translate(-50%,-60px) scale(1);}}
  .fx-flame{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,#ffe08a,#ff7a1a 60%,#c0300f);animation:flame .55s ease-out forwards;}
  @keyframes flame{0%{opacity:0;transform:scale(.3);}30%{opacity:1;}100%{opacity:0;transform:scale(2.2);}}
  .fx-spark{width:10px;height:10px;background:#9ff09f;border-radius:2px;animation:spark .8s ease-out forwards;}
  @keyframes spark{0%{opacity:0;transform:translateY(0) scale(.4);}40%{opacity:1;}100%{opacity:0;transform:translateY(-40px) scale(1);}}
  #bFlash{position:absolute;inset:0;background:#fff;opacity:0;z-index:4;pointer-events:none;}
  #bFlash.on{animation:bf .18s;}
  @keyframes bf{0%{opacity:.5;}100%{opacity:0;}}
  #bShake.shake{animation:bshake .35s;}
  @keyframes bshake{0%,100%{transform:translate(0,0);}20%{transform:translate(-6px,3px);}60%{transform:translate(5px,-2px);}}

  #shop{position:absolute;inset:0;z-index:26;display:none;flex-direction:column;padding:14px;background:rgba(0,0,0,.96);}
  #shop.show{display:flex;}
  .shop-title{font-size:17px;text-align:center;margin-bottom:6px;color:var(--gold);}
  .shop-gold{text-align:center;font-size:13px;margin-bottom:12px;}
  .shop-list{flex:1;overflow-y:auto;}
  .shop-row{display:flex;justify-content:space-between;align-items:center;border:2px solid #555;border-radius:6px;padding:10px 12px;margin-bottom:9px;}
  .shop-row b{font-size:15px;} .shop-row small{display:block;color:#9ab;font-size:11px;}
  .shop-row .price{color:var(--gold);font-size:14px;margin-right:10px;}
  .buy{border:2px solid #2a4;color:#7e7;background:#000;border-radius:5px;padding:6px 14px;font-family:inherit;font-size:13px;cursor:pointer;}
  .buy:active{background:#2a4;color:#000;}
  .btn{font-family:'DotGothic16',monospace;font-size:15px;color:#fff;background:#111;border:3px solid #fff;border-radius:7px;padding:11px;cursor:pointer;}
  .btn:active{background:#2a4;} .btn.green{border-color:#2a4;color:#7e7;}
  #partyStrip{display:flex;gap:8px;margin-top:4px;}
  .ps-unit{flex:1;font-size:10px;line-height:1.25;}
  .ps-unit .ps-name{color:var(--gold);font-size:10px;}
  .ps-unit .ps-lv{color:#bfe3ff;font-size:9px;font-weight:bold;}
  .ps-unit .ps-hp{color:var(--hp);} .ps-unit .ps-mp{color:var(--mp);}
  .ps-unit .hbar{margin-top:1px;height:5px;}
  .ps-unit.downed{opacity:.4;}
  #placeName{margin-top:4px;text-align:center;font-size:11px;letter-spacing:1px;
    color:#cfe6ff;border-top:1px solid #2a3550;padding-top:3px;}
  #placeName:empty{display:none;}
</style>

<div id="app">
  <div id="strip">
    <div class="strip-top">
      <span class="s-cell">◈<b id="sGold">0</b></span>
      <span class="s-cell" id="muteBtn" style="cursor:pointer;font-size:15px">🔊</span>
    </div>
    <div id="partyStrip"></div>
    <div id="placeName"></div>
  </div>

  <div id="stage">
    <canvas id="view"></canvas>
    <div id="msgBox" class="win"><div id="msgText"></div></div>
    <div id="cmdBox" class="win"></div>
  </div>

  <div id="pad">
    <div class="dpad">
      <div class="dbtn empty"></div><div class="dbtn" data-dir="up">▲</div><div class="dbtn empty"></div>
      <div class="dbtn" data-dir="left">◀</div><div class="dbtn empty"></div><div class="dbtn" data-dir="right">▶</div>
      <div class="dbtn empty"></div><div class="dbtn" data-dir="down">▼</div><div class="dbtn empty"></div>
    </div>
    <div class="act-col">
      <button class="abtn" id="btnA">けってい</button>
      <button class="abtn menu" id="btnMenu">めいれい</button>
    </div>
  </div>

  <div id="battle">
    <div id="bShake" class="b-stage">
      <div class="b-far"></div>
      <div class="b-grid"></div>
      <div id="bEnemies"></div>
      <div id="bFlash"></div>
    </div>
    <div id="bParty"></div>
    <div id="bAuto">AUTO ▢</div>
    <div id="bMsg" class="win"><div id="bMsgText"></div></div>
    <div id="bCmd" class="win"></div>
    <div id="bSub" class="win"></div>
  </div>

  <div id="shop">
    <div class="shop-title" id="shopTitle">みせ</div>
    <div class="shop-gold">しょじきん ◈<span id="shopGold">0</span></div>
    <div class="shop-list" id="shopList"></div>
    <button class="btn" style="margin-top:8px" onclick="game.closeShop()">みせを でる</button>
  </div>

  <div id="title">

// ストレージ互換層: Artifact環境では window.storage、通常ブラウザでは localStorage
const STORE = {
  async get(key){
    if(typeof window!=='undefined' && window.storage && window.storage.get){
      try{ return await window.storage.get(key); }catch(e){ /* fall through */ }
    }
    try{ const v=localStorage.getItem(key); return v==null?null:{key,value:v}; }
    catch(e){ return null; }
  },
  async set(key,value){
    if(typeof window!=='undefined' && window.storage && window.storage.set){
      try{ return await window.storage.set(key,value); }catch(e){ /* fall through */ }
    }
    try{ localStorage.setItem(key,value); return {key,value}; }
    catch(e){ return null; }
  }
};

// ===== ダンジョン自動生成（無限の塔）=====
function generateTower(floor){
  const W=11,H=11;
  const g=Array.from({length:H},()=>Array(W).fill('#'));
  function carve(x,y){
    g[y][x]='.';
    const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);
    for(const [dx,dy] of dirs){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&nx<W-1&&ny>0&&ny<H-1&&g[ny][nx]==='#'){
        g[y+dy/2][x+dx/2]='.'; carve(nx,ny);
      }
    }
  }
  carve(1,1);
  const floors=[];
  for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++) if(g[y][x]==='.') floors.push([x,y]);
  const entrance=floors.reduce((a,b)=>(b[1]>a[1])?b:a, floors[0]);
  const stair=floors.reduce((a,b)=>{
    const da=Math.abs(a[0]-entrance[0])+Math.abs(a[1]-entrance[1]);
    const db=Math.abs(b[0]-entrance[0])+Math.abs(b[1]-entrance[1]);
    return db>da?b:a;
  }, floors[0]);
  g[stair[1]][stair[0]]='>';
  // 宝箱を配置（入口・階段以外の通路から1〜2個）
  const spots=floors.filter(([x,y])=>!(x===entrance[0]&&y===entrance[1])&&!(x===stair[0]&&y===stair[1]));
  const chests={};
  const numChests = Math.random()<0.5?2:1;
  for(let i=0;i<numChests && spots.length;i++){
    const idx=Math.floor(Math.random()*spots.length);
    const [cx,cy]=spots.splice(idx,1)[0];
    g[cy][cx]='C'; // 塔の宝箱タイル
    // 中身: 階が深いほど豪華。ゴールド or 価値アイテム
    const roll=Math.random();
    if(roll<0.5){ chests[cx+','+cy]={gold: 50+floor*40+Math.floor(Math.random()*floor*30)}; }
    else if(roll<0.8){ chests[cx+','+cy]={item:'hipotion', n:1+Math.floor(floor/5)}; }
    else if(roll<0.95){ chests[cx+','+cy]={item:'panacea', n:1}; }
    else { // レア: 強力装備
      const rare = floor>=10?'dragon':(floor>=5?'iron':'steel');
      chests[cx+','+cy]={gear:rare}; }
  }
  return { rows:g.map(r=>r.join('')), entrance, stair, indoor:true, floor, chests, opened:{} };
}

    const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=type; o.frequency.value=f;
    const t=this.ctx.currentTime+s; g.gain.setValueAtTime(0.0001,t);

  playMulti(name, s){ let i=0; const dur=s.tempo/1000;
    const step=()=>{ if(!this.on||this.cur!==name) return;
      const k=i%s.melody.length;
      const mf=s.melody[k];
      if(mf>0){ this.tone(mf,0,dur*0.85,s.melodyType,.28); this.tone(mf,0.004,dur*0.85,s.melodyType,.12); } // 軽いデチューンで厚み
      const bf=s.bass[k];
      if(bf>0) this.tone(bf,0,dur*0.92,s.bassType,.32);
      const d=s.drum[k];
      if(d==='k'){ this.tone(110,0,0.09,'square',.5); this.noise(0,0.05,.25); }
      else if(d==='s'){ this.noise(0,0.12,.4); this.tone(200,0,0.06,'square',.2); }
      else if(d==='h'){ this.noise(0,0.04,.18); }
      i++; };
    step(); this.bgmTimer=setInterval(step,s.tempo); },
  stopBgm(){ if(this.bgmTimer){ clearInterval(this.bgmTimer); this.bgmTimer=null; } this.cur=null; },
  toggle(){ this.on=!this.on; if(!this.on) this.stopBgm(); return this.on; },
};

  // タップ即応ヘルパー（touch/click二重発火を防止）
  tap(el,fn){ if(!el) return; let handled=false;
    el.addEventListener('touchend',e=>{ if(e.cancelable) e.preventDefault(); handled=true; fn(); setTimeout(()=>handled=false,400); },{passive:false});
    el.addEventListener('click',()=>{ if(!handled) fn(); });
  },
  // 長押し（ms ミリ秒押し続けたら発動）。タップだけでは反応しない。スマホ/PC両対応
  hold(el,ms,fn){ if(!el) return;
    let timer=null;
    const start=(e)=>{ if(e&&e.cancelable) e.preventDefault();
      el.classList.add('holding');
      clearTimeout(timer);
      timer=setTimeout(()=>{ el.classList.remove('holding'); fn(); }, ms);
    };
    const cancel=()=>{ clearTimeout(timer); timer=null; el.classList.remove('holding'); };
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('touchend',cancel);
    el.addEventListener('touchcancel',cancel);
    el.addEventListener('touchmove',cancel);
    el.addEventListener('mousedown',start);
    el.addEventListener('mouseup',cancel);
    el.addEventListener('mouseleave',cancel);
  },

  // 読み込んだセーブに、最新版で追加された項目が欠けていたら初期値で補完する。
  // これにより古いセーブでも未定義フラグによる不具合を避けて「極力動く」ようにする。
  migrateSave(saved){
    const def=freshPlayer();
    // オブジェクトを再帰的に補完：savedに無いキーはdefから補う。
    // 配列やプリミティブはsavedの値を尊重（プレイ進捗を壊さない）。
    const fill=(d,s)=>{
      if(Array.isArray(d)) return Array.isArray(s)?s:d.slice();
      if(d && typeof d==='object'){
        const out = (s && typeof s==='object' && !Array.isArray(s)) ? s : {};
        for(const k in d){
          if(out[k]===undefined) out[k]= (d[k]&&typeof d[k]==='object'&&!Array.isArray(d[k])) ? JSON.parse(JSON.stringify(d[k])) : d[k];
          else out[k]=fill(d[k], out[k]);
        }
        return out;
      }
      return (s===undefined)?d:s;   // プリミティブはセーブ値優先、無ければ初期値
    };
    return fill(def, saved);
  },
  // アップデート確認：サーバーの version.json を読み、手元より新しければシークバー演出→再読み込み
  async checkUpdate(){
    const msg=document.getElementById('updateMsg');
    const bar=document.getElementById('updateBar');
    const fill=document.getElementById('updateBarFill');
    const btn=document.getElementById('updateBtn');
    const setMsg=t=>{ if(msg) msg.textContent=t; };
    // 数字比較用（"1.2.3" を比べる）
    const cmp=(a,b)=>{ const pa=String(a).split('.').map(Number), pb=String(b).split('.').map(Number);
      for(let i=0;i<Math.max(pa.length,pb.length);i++){ const x=pa[i]||0,y=pb[i]||0; if(x!==y) return x<y?-1:1; } return 0; };
    setMsg('かくにん ちゅう…');
    let latest=null;
    try{
      const res=await fetch('version.json?_='+Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('http '+res.status);
      const data=await res.json();
      latest=String(data.version||'').trim();
    }catch(e){
      setMsg('かくにん できませんでした（オフライン／ファイルを ちょくせつ ひらいている ばあいは できません）');
      return;
    }
    if(!latest){ setMsg('バージョンじょうほうが よめません'); return; }
    if(cmp(GAME_VERSION, latest)>=0){
      setMsg('さいしんばんです（ver '+GAME_VERSION+'）');
      return;
    }
    // 新しい版がある → シークバー演出してから再読み込み
    setMsg('あたらしい ばん ver '+latest+' が あります！ こうしん します…');
    if(btn) btn.style.pointerEvents='none';
    bar.classList.add('show');
    fill.style.width='0';
    let p=0;
    const step=()=>{ p+=Math.random()*16+6; if(p>100)p=100; fill.style.width=p+'%';
      if(p<100){ setTimeout(step, 120); }
      else { setTimeout(()=>{ setMsg('こうしん かんりょう！ さいよみこみ します。');
        // キャッシュを避けて最新を取得
        setTimeout(()=>location.reload(true), 500);
      }, 300); } };
    step();
  },

      const saved=JSON.parse(r.value);
      this.p=this.migrateSave(saved);     // 新項目を初期値で補完してから採用
      audio.init(); audio.resume(); audio.bgm(this.bgmFor());

  bindControls(){
    // 十字キー: dpad領域全体を1つのタッチ面として扱い、タッチ位置から方向を判定する。
    // 個別ボタンより判定が広く、隙間や少し外れた位置でも反応する（参考: 仮想ゲームパッドの考え方）
    const dpad=document.querySelector('.dpad');
    if(dpad){
      // タッチ座標→方向（中心からの相対位置。斜めゾーンも判定）
      const dirFromPoint=(clientX,clientY)=>{
        const r=dpad.getBoundingClientRect();
        const cx=r.left+r.width/2, cy=r.top+r.height/2;
        let dx=clientX-cx, dy=clientY-cy;
        const dead=r.width*0.12;                 // 中心の小さな不感帯
        if(Math.abs(dx)<dead && Math.abs(dy)<dead) return null;
        // 縦横どちらが優勢か。差が小さければ斜め扱い
        const ax=Math.abs(dx), ay=Math.abs(dy);
        const diagRatio=0.42;                    // この比率以内なら斜め
        const hor = dx>0?'right':'left';
        const ver = dy>0?'down':'up';
        if(ax>ay){ return (ay/ax>diagRatio) ? [hor,ver] : [hor]; }
        else      { return (ax/ay>diagRatio) ? [ver,hor] : [ver]; }
      };
      const lightUp=(dirs)=>{
        dpad.querySelectorAll('.dbtn[data-dir]').forEach(b=>{
          b.classList.toggle('pressed', !!dirs && dirs.includes(b.dataset.dir));
        });
      };
      const moveDirs=(dirs)=>{
        if(!dirs||!dirs.length) return;
        // グリッド移動：1つ目の方向を試し、ダメなら2つ目（斜め時の素直な処理）
        const before={x:this.p.x,y:this.p.y};
        this.tryMove(dirs[0]);
        if(dirs[1] && this.p.x===before.x && this.p.y===before.y) this.tryMove(dirs[1]);
      };
      let curDirs=null;
      const start=(cx,cy,e)=>{ if(e&&e.cancelable) e.preventDefault();
        const d=dirFromPoint(cx,cy); curDirs=d; lightUp(d);
        clearInterval(this.holdTimer);
        moveDirs(d);
        this.holdTimer=setInterval(()=>moveDirs(curDirs),170);
      };
      const move=(cx,cy,e)=>{ if(curDirs===null && !this._padDown) return;
        if(e&&e.cancelable) e.preventDefault();
        const d=dirFromPoint(cx,cy); curDirs=d; lightUp(d);
      };
      const end=(e)=>{ if(e&&e.cancelable) e.preventDefault();
        curDirs=null; this._padDown=false; lightUp(null); clearInterval(this.holdTimer);
      };
      if('ontouchstart' in window){
        dpad.addEventListener('touchstart',e=>{ this._padDown=true; const t=e.touches[0]; start(t.clientX,t.clientY,e); },{passive:false});
        dpad.addEventListener('touchmove',e=>{ const t=e.touches[0]; if(t) move(t.clientX,t.clientY,e); },{passive:false});
        dpad.addEventListener('touchend',end); dpad.addEventListener('touchcancel',end);
      } else {
        dpad.addEventListener('pointerdown',e=>{ this._padDown=true; start(e.clientX,e.clientY,e); });
        dpad.addEventListener('pointermove',e=>{ if(this._padDown) move(e.clientX,e.clientY,e); });
        dpad.addEventListener('pointerup',end); dpad.addEventListener('pointerleave',end); dpad.addEventListener('pointercancel',end);
      }
    }
    // ボタン: タップ即応（this.tap で二重発火防止）
    this.tap(document.getElementById('btnA'),()=>this.pressA());
    this.tap(document.getElementById('btnMenu'),()=>this.pressMenu());
    this.tap(document.getElementById('muteBtn'),()=>{
      const on=audio.toggle(); document.getElementById('muteBtn').textContent=on?'🔊':'🔇';
      if(on){ audio.init(); audio.resume(); audio.bgm(this.mode==='battle'?(this.isBossBattle?'boss':'battle'):this.bgmFor()); }
    });
    this.tap(document.getElementById('msgBox'),()=>this.advanceMsg());
    this.tap(document.getElementById('bMsg'),()=>this.advanceMsg());
    this.tap(document.getElementById('bAuto'),()=>this.toggleAuto());
    window.addEventListener('keydown',e=>{
      const k={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'}[e.key];
      if(k){ e.preventDefault(); this.tryMove(k); }
      else if(e.key==='Enter'||e.key===' '){ e.preventDefault(); this.pressA(); }
      else if(e.key==='Shift') this.pressMenu();
    });
  },

  pressA(){
    if(this.msgQueue.length||this._typing){ this.advanceMsg(); return; }
    if(this.cmdCtx==='field'){ this.confirmCmd(); return; }
    if(this.mode==='battle'){ this.battleA(); return; }
    if(this.mode==='field') this.interact();
  },
  pressMenu(){ if(this.mode!=='field'||this.msgQueue.length) return; this.openFieldMenu(); },

  tryMove(dir){
    if(this.mode!=='field'||this.msgQueue.length||this.cmdCtx) return;
    const p=this.p; p.dir=dir;
    const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[dir];
    const nx=p.x+d[0], ny=p.y+d[1], m=this.curMap();
    if(ny<0||ny>=m.rows.length||nx<0||nx>=m.rows[0].length) return;
    const t=m.rows[ny][nx];
    if(t==='D' && !this.doorIsOpen()){ this.draw(); return; }
    if(t!=='D' && SOLID.has(t)){ this.draw(); return; }
    p.x=nx; p.y=ny; this.frame^=1; this.draw();
    // 塔の宝箱→踏んだら開ける（素通りもできる。取得後はただの床）
    if(p.map==='tower' && t==='C' && !(this.tower.opened&&this.tower.opened[nx+','+ny])){
      this.openTowerChest(nx,ny); return;
    }
    // 通常マップの宝箱→踏んだら開ける（封印箱は除く＝開かないが素通りはできる）
    const stepChest=CHESTS.find(c=>c.map===p.map&&c.x===nx&&c.y===ny);
    if(stepChest && !this.p.chests.includes(stepChest.id)
       && !(stepChest.locked && this.p.flags.excaliburStage<3)){
      this.openChest(stepChest); return;
    }
    // エルフ国：世界樹の根の鍵に乗ったら取得（けっていを押さなくてよい）
    if(p.map==='elfcave' && nx===11 && ny===5 && !p.flags.elfHasKey){
      this.elfKeyTalk(); return;
    }
    const w=WARPS.find(w=>w.map===p.map&&w.x===nx&&w.y===ny);
    if(w){
      if(t==='>') this.promptWarp(w);   // 階段だけ「すすむ/まだ」を聞く
      else this.doWarp(w);              // 村・町・城・洞窟の出入りは乗ったら即入場
      return;
    }
    // エルフ国：世界樹の前に出現する「帰還の扉」(6,8)→もとの国の橋の中央へ
    if(p.map==='elf' && p.flags.elfReturnDoor && nx===6 && ny===8){
      this.returnToWorldFromElf(); return;
    }
    // エルフ国の外フィールドの出口（,）: クリア後のみ もとの せかいへ戻れる
    if(p.map==='elf' && t===','){
      if(p.flags.elfCleared){
        this.message(['ひかりの もんが ひらいている。','もとの せかいへ もどりますか？'],()=>{
          this.cmdCtx='field';
          this.cmdItems=[
            {label:'もどる',act:()=>{ this.closeCmd(); this.returnToWorldFromElf(); }},
            {label:'まだ',act:()=>{ this.closeCmd(); }},
          ]; this.cmdSel=0; this.renderCmd('cmdBox');
        });
      } else {
        this.message(['ひかりの もんは とじている。','せかいじゅを すくわぬ かぎり、もとの せかいへは もどれない。']);
      }
      return;
    }
    // 橋中央の待機イベント（エクスカリバー）
    if(p.map==='world' && t==='B'){ this.checkBridgeEvent();
      if(this._bridgeTimer) return; // 計測中はエンカウントしない
    }
    if(p.map==='world'||p.map==='cave1'||p.map==='cave2'){
      const rate = p.map==='world'?0.10:0.15;
      if(Math.random()<rate) this.startBattle(this.pick(ENC_GROUPS[p.map]));
    } else if(p.map==='elf'||p.map==='elfcave'){
      const rate = p.map==='elf'?0.12:0.16;
      if(Math.random()<rate) this.startBattle(this.pick(ENC_GROUPS[p.map]));
    } else if(p.map==='tower'){
      if(Math.random()<0.18) this.startBattle(this.towerEncounter());
    }
  },
  // ボス撃破後の帰還：もとの国の橋の中央へ。王へ報告する独り言
  returnToWorldFromElf(){ const p=this.p;
    p.map='world'; p.x=10; p.y=9; p.dir='up';   // 橋(B)の中央
    p.flags.backFromElf=true;
    audio.se('warp');
    this.enterField(); audio.bgm(this.bgmFor());
    this.draw(); this.setPlace();
    this.message([
      'ひかりに つつまれ──',
      'もとの せかい、はしの まんなかに もどってきた。',
      'ゆうしゃ「…まずは おうさまに ほうこく しに いこう。」'
    ]);
  },
  // エルフ国から もとの せかい（塔があった外フィールド）へ戻る
  exitElf(){ const p=this.p;    p.map='world';
    if(p.elfReturnWorld){ p.x=p.elfReturnWorld.x; p.y=p.elfReturnWorld.y; }
    else { p.x=16; p.y=16; } // 念のため塔の近く
    audio.se('warp'); audio.bgm(this.bgmFor());
    this.draw(); this.setPlace();
    this.message(['ひかりに つつまれ──','もとの せかいの フィールドに もどってきた。']);
  },
  // 階段を踏んだとき：自動で移らず「すすむ/まだ」を聞く（建物の出入りは確認なし）
  promptWarp(w){
    this.message(['かいだんが ある。','つぎへ すすみますか？'],()=>{
      this.cmdCtx='field';
      this.cmdItems=[
        {label:'すすむ', act:()=>{ this.closeCmd(); this.doWarp(w); }},
        {label:'まだ', act:()=>{ this.closeCmd(); }},
      ]; this.cmdSel=0; this.renderCmd('cmdBox');
    });
  },
  doWarp(w){ this.p.map=w.to.map; this.p.x=w.to.x; this.p.y=w.to.y; audio.se('warp');
    audio.bgm(this.bgmFor());
    this.draw(); this.setPlace();
    if(w.to.map==='town1' && !this.p.flags.joinWarrior) this.queueStory('town1first');
    if(w.to.map==='town2') this.queueStory('town2first');
    if(w.to.map==='cave2') this.queueStory('cavedeep');
  },

  // 加入済み仲間など、フラグ条件で隠すNPCを除いた一覧
  visibleNpcs(map){
    return (NPCS[map]||[]).filter(n=>
      !(n.hideIfFlag && this.p.flags[n.hideIfFlag]) &&
      !(n.showIfFlag && !this.p.flags[n.showIfFlag]) &&
      !(n.hideIfFlagOn && this.p.flags[n.hideIfFlagOn])
    );
  },
  interact(){
    const p=this.p, d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[p.dir];
    const fx=p.x+d[0], fy=p.y+d[1], m=this.curMap();
    // 塔: 足元が階段なら次の階へ（踏んでも進まず、決定で進む）
    if(p.map==='tower' && m.rows[p.y] && m.rows[p.y][p.x]==='>'){
      this.message(['かいだんを みつけた。','つぎの かいへ すすみますか？'],()=>{
        this.cmdCtx='field';
        this.cmdItems=[
          {label:'すすむ',act:()=>{ this.closeCmd(); this.towerNextFloor(); }},
          {label:'まだ',act:()=>{ this.closeCmd(); }},
        ]; this.cmdSel=0; this.renderCmd('cmdBox');
      });
      return;
    }
    // 足元がマップ切替タイルなら：階段は確認、建物の出入りは即ワープ
    if(p.map!=='tower'){
      const wHere=WARPS.find(w=>w.map===p.map&&w.x===p.x&&w.y===p.y);
      if(wHere){
        if(m.rows[p.y][p.x]==='>') this.promptWarp(wHere);
        else this.doWarp(wHere);
        return;
      }
    }
    if(m.rows[fy]&&m.rows[fy][fx]==='D'){
      if(p.map==='elfcave'){
        if(p.flags.elfDoorOpen) this.message(['とびらは ひらいている。']);
        else if(p.flags.elfHasKey){ p.flags.elfDoorOpen=true; this.draw(); this.message(['せかいじゅの かぎを つかった！','ねもとへの とびらが ひらいた。']); }
        else this.message(['とびらに かぎが かかっている。','どうくつ おくの ふういんの まを さがそう。']);
      } else {
        if(p.flags.doorOpen) this.message(['とびらは ひらいている。']);
        else if(p.flags.hasKey){ p.flags.doorOpen=true; this.draw(); this.message(['ましょうの しろの かぎを つかった！','とびらが ひらいた。']); }
        else this.message(['かぎが かかっている。']);
      }
      return;
    }
    const chest=CHESTS.find(c=>c.map===p.map&&c.x===fx&&c.y===fy);
    if(chest){ this.openChest(chest); return; }
    // 塔の宝箱
    if(p.map==='tower' && m.rows[fy] && m.rows[fy][fx]==='C'){ this.openTowerChest(fx,fy); return; }
    // 塔の入口
    if(p.map==='world' && m.rows[fy] && m.rows[fy][fx]==='O'){ this.enterTowerPrompt(); return; }
    const npc=this.visibleNpcs(p.map).find(n=>n.x===fx&&n.y===fy);
    if(npc){ this.talkTo(npc); return; }
    this.message(['だれも いない。']);
  },
  // 現在マップの鍵扉Dが開いているか（エルフ国は別フラグ）
  doorIsOpen(){ return this.p.map==='elfcave' ? this.p.flags.elfDoorOpen : this.p.flags.doorOpen; },
  openChest(c){
    if(this.p.chests.includes(c.id)){ this.message(['たからばこは からっぽだ。']); return; }
    if(c.locked && this.p.flags.excaliburStage<3){ this.message(['ふしぎな ちからで ふうじられている…','どくろが なにか しっていそうだ。']); return; }
    this.p.chests.push(c.id); audio.se('chest'); this.draw();
    const g=c.give; let msg;
    if(g.gold){ this.p.gold+=g.gold; msg=`たからばこを あけた！ ◈${g.gold}を てにいれた。`; }
    else if(g.item==='twig'){ msg=`たからばこを あけた！ ひのきのぼうきれを てにいれた。`; this.giveTwig(); }
    else { this.giveItem(g.item,g.n); msg=`たからばこを あけた！ ${ITEMS[g.item].name}を ${g.n}こ てにいれた。`; }
    this.updateStrip(); this.message([msg]);
  },

  talkTo(npc){
    if(npc.talk){ this.message(npc.talk); return; }
    switch(npc.act){
      case 'king': this.kingTalk(); break;
      case 'sage': this.sageTalk(); break;
      case 'warrior': this.warriorTalk(); break;
      case 'shop_weapon1': this.openShop('weapon1'); break;
      case 'shop_weapon2': this.openShop('weapon2'); break;
      case 'shop_item': this.openShop('item'); break;
      case 'shop_elfweapon': this.openShop('elfweapon'); break;
      case 'shop_elfarmor': this.openShop('elfarmor'); break;
      case 'shop_elfitem': this.openShop('elfitem'); break;
      case 'inn': this.inn(npc.innCost||10); break;
      case 'church': this.church(); break;
      case 'boss': this.bossTalk(); break;
      case 'skull': this.skullTalk(); break;
      case 'jobmaster': this.jobMasterTalk(); break;
      case 'slimejob': this.message([
        'スライム「おいらも れんきんじゅつしの しゅぎょうを すれば…」',
        'スライム「いつか にんげんに てんしょく できるんだって！」',
        'スライム「ゆうしゃさん、おさきに どうぞ。」'
      ]); break;
      case 'questboard': this.questBoard(); break;
      case 'worldtree': this.worldtreeTalk(); break;      case 'elfmaiden': this.elfMaidenTalk(); break;
      case 'elfkey': this.elfKeyTalk(); break;
      case 'elfboss': this.elfBossTalk(); break;
      case 'princess': this.princessTalk(); break;
    }
  },
  kingTalk(){ const p=this.p;
    if(!p.flags.metKing){ p.flags.metKing=true; p.flags.hasKey=true;
      this.message([
        'アルディアおう「おお ゆうしゃ よ！」',
        'ましょう ガルゾスが ひめ フィーナを さらい、せかいに やみを ひろげておる。',
        'これは ましょうの しろの かぎ じゃ。さずけよう。',
        'まちで そなえを ととのえ、ガルゾスを たおし ひめを すくうのだ！',
        'アルディアおう「ガルゾスは きょうだい。ふつうの ちからでは とどかぬ。」',
        'アルディアおう「みなみの 『てんしょくの しろ』で てんしょくを すれば、しんの ちからに めざめよう。」',
        '（じょうを でて にしの まちへ。さらに みなみの むらも たずねよ）'
      ]);
    } else if(!p.flags.won){
      if(!p.flags.jobChanged && p.lv>=10) this.message(['アルディアおう「レベルは じゅうぶん。みなみの てんしょくの しろへ いくのだ！」','アルディアおう「さもなくば ガルゾスには かてぬ ぞ。」']);
      else this.message(['アルディアおう「ガルゾスを たおし、ひめを すくうのだ！」']);
    }
    else if(p.flags.elfCleared && p.flags.backFromElf && !p.flags.finalEnd){
      this.finalCeremony();
    }
    else if(p.flags.finalEnd){
      this.message(['アルディアおう「ゆうしゃ よ、そなたの たびに さちあれ。」']);
    }
    else this.message(['アルディアおう「よくぞ せかいを すくった、ゆうしゃ よ！」']);
  },
  // エルフ国クリア後、城での最終式典 → 縁結び → エンドロール
  finalCeremony(){ const p=this.p;
    p.flags.finalEnd=true;
    audio.stopBgm();
    this.message([
      'アルディアおう「おお、ゆうしゃ よ！ エルフの くにも すくった と いうのか！」',
      'アルディアおう「なんという ことだ…そなたは まことの えいゆうじゃ。」',
      'フィーナ「ゆうしゃ さま、おかえりなさい。」',
      'フィーナ「あなたの ぶじを、ずっと いのって いました。」',
      'アルディアおう「フィーナ よ。」',
      'アルディアおう「そなたが ゆうしゃの もとへ いきたい と のぞむなら──」',
      'アルディアおう「ちちは それを とめは せぬ。いきなさい。」',
      'フィーナ「…！ おとうさま…」',
      'フィーナ「ゆうしゃ さま。わたくしは あなたと ならば、どこまでも いっしょですわ。…ぽっ」',
      'ふたりは てを とりあった。あらたな ものがたりの はじまりである。',
      'そして、でんせつが　はじまる',
    ],()=>{ this.rollCredits(); });
  },
  // エンドロール：英文スタッフロールを流す
  rollCredits(){
    this.mode='credits';
    document.getElementById('msgBox').classList.remove('show');
    document.getElementById('strip').classList.remove('show');
    document.getElementById('pad').classList.remove('show');
    audio.init(); audio.resume(); audio.bgm('ending');
    const roll=[
      ['h1','ALDIA FANTASY'],
      ['role','DIRECTOR'],['name','TRP'],
      ['role','GAME DESIGN'],['name','TRP'],
      ['role','SCENARIO'],['name','TRP'],
      ['role','PROGRAMMING'],['name','Claude (Anthropic)'],
      ['role','PIXEL ART & GRAPHICS'],['name','Claude Pixel Studio'],
      ['role','MAP DESIGN'],['name','Aldia Cartography Team'],
      ['role','MUSIC COMPOSED & ARRANGED'],['name','Chiptune Orchestra'],
      ['role','SOUND EFFECTS'],['name','Web Audio Lab'],
      ['role','BATTLE SYSTEM'],['name','Turn Engine Works'],
      ['role','QUALITY ASSURANCE'],['name','TRP'],
      ['role','TEST PLAYER'],['name','TAKAHASHI'],
      ['role','SPECIAL THANKS'],['name','Princess Fiina'],['name','The Elf Queen'],['name','Warrior & Sage'],['name','All The Villagers'],['name','AND YOU'],
      ['role','RUNS ON'],['name','HTML5 / JavaScript / Canvas'],
      ['name','Thank you for playing!'],
      ['name','Stay tuned for the next ALDIA FANTASY!'],
    ];
    const inner=document.getElementById('creditsInner');
    inner.className='';
    inner.innerHTML=roll.map(([c,t])=>`<div class="${c}">${t}</div>`).join('');
    const cr=document.getElementById('credits');
    cr.classList.add('show');
    // エンドロール中はタップ/クリックを受け付けない
    cr.onclick=(e)=>{ e.stopPropagation(); e.preventDefault(); };
    // リフローを挟んでからアニメ開始
    void inner.offsetWidth;
    inner.classList.add('run');
    // スクロール終了 → THE END を中央に固定表示
    const onScrollEnd=()=>{ inner.removeEventListener('animationend',onScrollEnd);
      // クレジットが流れきって画面が空になったあと、少し間をおいてからTHE END
      inner.classList.remove('run');
      inner.innerHTML='';
      setTimeout(()=>this.showTheEnd(), 1400);
    };
    inner.addEventListener('animationend',onScrollEnd);
  },
  // THE END を画面中央にアニメ表示して固定。3秒後にタップでタイトルへ
  showTheEnd(){
    const cr=document.getElementById('credits');
    const inner=document.getElementById('creditsInner');
    inner.classList.remove('run');
    inner.innerHTML='<div class="theend">THE END</div>';
    inner.style.top='0'; inner.style.height='100%';
    inner.style.display='flex'; inner.style.flexDirection='column';
    inner.style.justifyContent='center'; inner.style.alignItems='center';
    // 3秒たってからタップを受け付ける
    let ready=false;
    setTimeout(()=>{ ready=true;
      const hint=document.createElement('div'); hint.className='endhint'; hint.textContent='タップで タイトルへ';
      inner.appendChild(hint);
    }, 3000);
    cr.onclick=(e)=>{ e.stopPropagation(); e.preventDefault();
      if(!ready) return;
      cr.classList.remove('show'); audio.stopBgm(); this.save(); location.reload();
    };
  },
  joinAlly(key){
    if(this.p.party.includes(key)) return;
    const a=ALLIES[key];
    this.p.party.push(key);
    // 加入時の状態を勇者Lvに合わせて初期化
    const st={ lv:a.lv, maxHp:a.maxHp, maxMp:a.maxMp, atk:a.atk, def:a.def, spd:a.spd, spells:a.spells.slice() };
    st.hp=st.maxHp; st.mp=st.maxMp;
    while(st.lv<this.p.lv){ st.lv++; st.maxHp+=6; st.maxMp+=(a.maxMp>0?3:0); st.atk+=1; st.def+=1;
      const learn=a.learn&&a.learn[st.lv]; if(learn&&!st.spells.includes(learn)) st.spells.push(learn); }
    st.hp=st.maxHp; st.mp=st.maxMp;
    this.p.allyState[key]=st;
  },
  sageTalk(){ const p=this.p;
    if(!p.flags.joinSage){ p.flags.joinSage=true; this.joinAlly('sage');
      this.message([
        'けんじゃ「ガルゾスは ほのおの まほうを つかう。」',
        'けんじゃ「わしも ともに たたかおう。なかまに くわえてくれ。」',
        'けんじゃ が なかまに くわわった！',
        'けんじゃ「みなみの ぶきやで りゅうの よろいを そろえると よい。」'
      ],()=>{ this.updateStrip(); this.draw(); });
    } else this.message(['けんじゃ「Lvを あげて ガルゾスに のぞむのじゃ。」']);
  },
  warriorTalk(){ const p=this.p;
    if(!p.flags.joinWarrior){ p.flags.joinWarrior=true; this.joinAlly('warrior');
      this.message([
        'せんし「おまえが うわさの ゆうしゃか。」',
        'せんし「おれも ガルゾスには うらみが ある。つれていってくれ！」',
        'せんし が なかまに くわわった！'
      ],()=>{ this.updateStrip(); this.draw(); });
    } else this.message(['せんし「いつでも たたかう じゅんびは できてるぜ。」']);
  },

  // ===== 転職（城の導師）=====
  jobMasterTalk(){ const p=this.p;
    // こだいの しんでん（エルフ国）= 2次職（Lv15・1次職から派生）
    if(this.p.map==='elfjob'){ this.elfJobMasterTalk(); return; }
    if(p.flags.jobChanged){ this.message(['どうし「そなたは すでに てんしょく ずみじゃ。」']); return; }
    if(p.lv<10){ this.message(['どうし「てんしょくには レベル10 いじょうが ひつよう。」',`どうし「いまは レベル${p.lv}。はげむのじゃ。」`]); return; }
    this.message([
      'どうし「ゆうしゃ よ。そなたは てんしょくの しかくを えた。」',
      'どうし「どの みちを えらぶ？」'
    ],()=>{
      this.cmdCtx='field';
      this.cmdItems=[
        {label:'パラディン（まもり）',act:()=>this.doJobChange('paladin')},
        {label:'ようしゃ（こうげき）',act:()=>this.doJobChange('hero_k')},
        {label:'やめる',act:()=>{ this.closeCmd(); this.message(['どうし「まよいが あるなら また こい。」']); }},

  // エルフ国・こだいの しんでん：2次職（Lv15・パラディン/ようしゃ から）
  elfJobMasterTalk(){ const p=this.p;
    if(p.flags.jobChanged2){ this.message(['せいれい「そなたは すでに きわめし もの。」']); return; }
    if(p.lv<10){ this.message(['せいれい「こだいの ちからを あつかうには レベル10 いじょうが ひつよう。」',`せいれい「いまは レベル${p.lv}。さらに はげむのじゃ。」`]); return; }
    // 1次職を選ぶための共通メニュー（派生先も提示）
    const askPath=(prompt)=>{
      this.message(prompt,()=>{
        this.cmdCtx='field';
        this.cmdItems=[
          {label:'まもりの みち（→ジェネラル）',act:()=>this.elfChooseJob('paladin')},
          {label:'こうげきの みち（→バーサーカー）',act:()=>this.elfChooseJob('hero_k')},
          {label:'やめる',act:()=>{ this.closeCmd(); this.message(['せいれい「こころが きまったら また おいで。」']); }},
        ]; this.cmdSel=0; this.renderCmd('cmdBox');
      });
    };
    // (A) 1次職済み・Lv15 → そのまま2次職へ
    if(p.flags.jobChanged && p.lv>=15){
      const next=(p.job==='paladin')?'general':(p.job==='hero_k'?'berserker':null);
      if(!next){ this.message(['せいれい「そなたの みちは ここには ない。」']); return; }
      const nj=JOBS[next];
      this.message([
        'せいれい「こだいの ちからが そなたに こたえる。」',
        `せいれい「${JOBS[p.job].name} の さきへ──「${nj.name}」へ いたる みちが ある。」`,
        `せいれい「${nj.desc}」`,
        'すすむか？'
      ],()=>{
        this.cmdCtx='field';
        this.cmdItems=[
          {label:`${nj.name}に なる`,act:()=>this.doJobChange(next,true)},
          {label:'やめる',act:()=>{ this.closeCmd(); this.message(['せいれい「こころが きまったら また おいで。」']); }},
        ]; this.cmdSel=0; this.renderCmd('cmdBox');
      });
      return;
    }
    // (B) 1次職済み・Lv10〜14 → 2次職にはLv15が必要
    if(p.flags.jobChanged){
      this.message(['せいれい「そなたは すでに みちを えらんで おるな。」',`せいれい「2じしょくには レベル15 いじょうが ひつよう。いまは レベル${p.lv}。」`,'せいれい「ちからを つけて また おいで。」']);
      return;
    }
    // (C) 1次職未習得・Lv15以上 → 救済：1次職と2次職を一気に開花
    if(!p.flags.jobChanged && p.lv>=15){
      askPath([
        'せいれい「ほう…そなた、まだ みちを えらんで おらぬな。」',
        'せいれい「あんじるな。こだいの ちからが、いっきに みちを ひらいて くれよう。」',
        'せいれい「どの みちを えらぶ？」'
      ]);
      return;
    }
    // (D) 1次職未習得・Lv10〜14 → 救済：まず1次職だけ授ける
    askPath([
      'せいれい「そなた、まだ ふるさとで みちを えらんで おらぬな。」',
      'せいれい「よかろう。ここで みちを さずけよう。」',
      `せいれい「2じしょくには レベル15が ひつよう。いまは レベル${p.lv} ゆえ、まずは いちじしょく を。」`,
      'せいれい「どの みちを えらぶ？」'
    ]);

  // エルフ神殿で道を選んだとき：Lv15以上なら1次+2次を一気に、未満なら1次職だけ
  elfChooseJob(firstJob){
    const p=this.p;
    this.closeCmd();
    if(p.lv>=15){
      const second=(firstJob==='paladin')?'general':'berserker';
      // 1次職→2次職を連続適用
      this.applyJob(firstJob,false);
      this.applyJob(second,true);
      const j1=JOBS[firstJob], j2=JOBS[second];
      const lines=[
        'こだいの ちからが あふれだす！',
        `ゆうしゃは ${j1.name}を へて 「${j2.name}」へ いたった！`,
      ];
      if(j2.trait==='cover') lines.push('せんとうちゅう、ひんしの なかまを じどうで かばう ように なった！');
      if(j2.trait==='fury') lines.push('HPが ひくいほど あたえる ダメージが あがる ように なった！');
      audio.se('levelup'); this.updateStrip();
      this.message(lines);
    } else {
      this.doJobChange(firstJob,false);
    }
  },
  // 職業ボーナスを適用するだけの内部関数（メッセージは出さない）
  applyJob(job,second){
    const p=this.p, j=JOBS[job];
    p.job=job;
    if(second) p.flags.jobChanged2=true; else p.flags.jobChanged=true;
    p.maxHp+=j.bonusHp; p.baseDef+=j.bonusDef; p.baseAtk+=j.bonusAtk; p.hp=p.maxHp;
    if(j.learn && !p.spells.includes(j.learn)) p.spells.push(j.learn);
  },
  doJobChange(job,second){
    this.closeCmd();
    this.applyJob(job,second);
    const p=this.p, j=JOBS[job];
    audio.se('levelup'); this.updateStrip();
    const lines=[
      `ゆうしゃは ${j.name}に ${second?'しんか':'てんしょく'} した！`,
      `さいだいHP+${j.bonusHp} こうげき+${j.bonusAtk} まもり+${j.bonusDef}`,
    ];
    if(j.learn) lines.push(`じゅもん「${SPELLS[j.learn].name}」を おぼえた！`);
    if(j.trait==='cover') lines.push('せんとうちゅう、ひんしの なかまを じどうで かばう ように なった！');
    if(j.trait==='fury') lines.push('HPが ひくいほど あたえる ダメージが あがる ように なった！');
    this.message(lines);
  },
  // ===== 依頼掲示板（サブクエスト）=====
  questBoard(){ const p=this.p;
    this.message(['けいじばん「ぼうけんしゃへの いらい」'],()=>{
      this.cmdCtx='field';
      this.cmdItems=Object.keys(SUBQUESTS).map(qid=>{
        const q=SUBQUESTS[qid], st=p.quests[qid];
        let tag='';
        if(!st) tag='【みうけ】';
        else if(st.state==='done') tag='【かんりょう】';
        else if(st.count>=q.need) tag='【たっせい！】';
        else tag=`【${st.count}/${q.need}】`;
        return {label:`${tag}${q.name}`,act:()=>this.questDetail(qid)};
      });
      this.cmdItems.push({label:'とじる',act:()=>this.closeCmd()});
      this.cmdSel=0; this.renderCmd('cmdBox');
    });
  },
  questDetail(qid){ const p=this.p, q=SUBQUESTS[qid], st=p.quests[qid];
    this.closeCmd();
    if(!st){
      this.message([q.accept, `（${q.desc}）`],()=>{
        p.quests[qid]={state:'active',count:0};
        this.message(['いらいを うけた！']);
      });
    } else if(st.state==='done'){
      this.message(['けいじばん「この いらいは かんりょうずみ。」']);
    } else if(st.count>=q.need){
      st.state='done'; p.gold+=q.rewardGold; this.giveItem(q.rewardItem,q.rewardN);
      audio.se('coin'); this.updateStrip();
      this.message([q.done, `◈${q.rewardGold} と ${ITEMS[q.rewardItem].name}×${q.rewardN} を うけとった！`]);
    } else {
      this.message([`${q.desc}`,`いまの しんちょく：${st.count}/${q.need}`]);
    }
  },
  questProgress(enemyKey){
    const p=this.p;
    Object.keys(SUBQUESTS).forEach(qid=>{
      const q=SUBQUESTS[qid], st=p.quests[qid];
      if(st && st.state==='active' && q.target===enemyKey && st.count<q.need) st.count++;
    });
  },

  enterTower(floor){

    p.map='tower'; p.towerFloor=floor;
    p.x=this.tower.entrance[0]; p.y=this.tower.entrance[1]; p.dir='up';
    audio.bgm('cave'); this.draw(); this.setPlace();
    this.message([`とうの ${floor}かいに たどりついた。`,'かいだん(>)を めざせ。']);

  towerNextFloor(){

  exitTower(){
    const p=this.p;
    p.towerBest=Math.max(p.towerBest||0, p.towerFloor);
    p.map='world';
    if(p.towerReturn){ p.x=p.towerReturn.x; p.y=p.towerReturn.y; p.towerReturn=null; }
    this.tower=null; audio.bgm('field'); this.draw(); this.setPlace();
    this.message([`とうから だっしゅつ した。`,`さいかい とうたつ：${p.towerBest}かい`]);

  towerEncounter(){
    const f=this.p.towerFloor;
    const pool = f<=3?['slime','ghost','bat'] : f<=7?['wolf','mage','bat','ghost'] : f<=12?['golem','mage','reaper','wolf'] : ['reaper','golem','reaper','mage'];
    const n = f<=3?1 : f<=8?(Math.random()<0.5?2:1) : (Math.random()<0.5?3:2);
    const group=[]; for(let i=0;i<n;i++) group.push(this.pick(pool));
    return group;
  },
  openTowerChest(x,y){
    const t=this.tower, key=x+','+y;
    if(t.opened[key]){ this.message(['たからばこは からっぽだ。']); return; }
    t.opened[key]=true; audio.se('chest');
    const g=t.chests[key]; let msg;
    if(g.gold){ this.p.gold+=g.gold; msg=`たからばこを あけた！ ◈${g.gold}を てにいれた。`; }
    else if(g.gear){
      if(!this.p.ownedGear.includes(g.gear)){ this.p.ownedGear.push(g.gear);
        msg=`たからばこを あけた！ ${GEAR[g.gear].name}を てにいれた！`; }
      else { this.p.gold+=300; msg=`たからばこを あけた！ ${GEAR[g.gear].name}…は もっていた。◈300に かえた。`; }
    }
    else { this.giveItem(g.item,g.n); msg=`たからばこを あけた！ ${ITEMS[g.item].name}を ${g.n}こ てにいれた。`; }
    this.updateStrip(); this.message([msg]);
  },
