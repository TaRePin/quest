  // どこでもセーブ
  saveMenu(){
    this.closeCmd();   // 先にフィールドメニューを閉じ、確認メッセージが枠の後ろに隠れないように
    this.message(['ぼうけんの しょに きろくしますか？'],()=>{
      this.cmdCtx='field';
      this.cmdItems=[
        {label:'きろくする',act:()=>{ this.closeCmd(); this.save(true); }},
        {label:'やめる',act:()=>{ this.closeCmd(); }},
      ]; this.cmdSel=0; this.renderCmd('cmdBox');
    });
  },
  // 装備メニュー: 武器/防具スロットを選ぶ
  equipMenu(){
    const p=this.p;
    const wn=GEAR[p.equip.weapon].name, an=GEAR[p.equip.armor].name;
    this.cmdItems=[
      {label:`ぶき：${wn}`,act:()=>this.equipSlotMenu('weapon')},
      {label:`よろい：${an}`,act:()=>this.equipSlotMenu('armor')},
      {label:'もどる',act:()=>this.openFieldMenu()},
    ]; this.cmdSel=0; this.renderCmd('cmdBox');
  },
  equipSlotMenu(slot){
    const p=this.p;
    // 呪われた武器を装備中は外せない
    if(slot==='weapon' && GEAR[p.equip.weapon]?.cursed){
      const wn=GEAR[p.equip.weapon].name;
      this.message([`${wn}は からだから はなれない…！`],()=>this.equipMenu()); return;
    }
    const owned=p.ownedGear.filter(g=>GEAR[g].slot===slot);
    this.cmdItems=owned.map(g=>{
      const ge=GEAR[g], val=slot==='weapon'?`こうげき+${ge.atk}`:`しゅび+${ge.def}`;
      const cur=p.equip[slot]===g?'▶':'　';
      return {label:`${cur}${ge.name} ${val}`,act:()=>this.doEquip(slot,g)};
    });
    this.cmdItems.push({label:'もどる',act:()=>this.equipMenu()});
    this.cmdSel=0; this.renderCmd('cmdBox');
  },
  doEquip(slot,g){
    const p=this.p;
    p.equip[slot]=g;
    if(g==='twig'){ p.flags.cursed=true; audio.se('damage');
      this.closeCmd(); if(this.mode==='field') this.draw();
      this.message(['ひのきの ぼうきれを そうびした。','…のろわれた！']); return; }
    if(slot==='weapon' && g!=='twig') p.flags.cursed=(p.equip.weapon==='twig');
    audio.se('select'); this.updateStrip();
    this.closeCmd(); if(this.mode==='field') this.draw();
    this.message([`${GEAR[g].name}を そうびした。`]);
  },
  fieldSpellMenu(){ const u=this.p.spells.filter(s=>SPELLS[s].field);
    if(!u.length){ this.message(['つかえる じゅもんが ない。']); return; }
    this.cmdItems=u.map(s=>({label:`${SPELLS[s].name}(${SPELLS[s].mp})`,act:()=>this.castField(s)}));
    this.cmdItems.push({label:'もどる',act:()=>this.openFieldMenu()}); this.cmdSel=0; this.renderCmd('cmdBox');
  },
  castField(k){ const s=SPELLS[k]; if(this.p.mp<s.mp){ this.message(['MPが たりない。']); return; }
    this.p.mp-=s.mp; const before=this.p.hp; this.p.hp=Math.min(this.p.maxHp,this.p.hp+s.amt);
    const healed=this.p.hp-before;
    audio.se('heal'); this.updateStrip(); this.closeCmd();
    this.message([`${s.name}を となえた！\nHPが ${healed} かいふく した。`]);
  },
  fieldItemMenu(){ const keys=Object.keys(this.p.items).filter(k=>this.p.items[k]>0);
    if(!keys.length){ this.message(['どうぐを もっていない。']); return; }
    this.cmdItems=keys.map(k=>({label:`${ITEMS[k].name}(${this.p.items[k]})`,act:()=>this.useItemField(k)}));
    this.cmdItems.push({label:'もどる',act:()=>this.openFieldMenu()}); this.cmdSel=0; this.renderCmd('cmdBox');
  },
  useItemField(k){ const it=ITEMS[k]; let line;
    if(it.type==='revive'){
      const downed=this.p.party.filter(key=>this.p.allyState[key].hp<=0);
      if(!downed.length){ this.message(['たおれている なかまが いない。'],()=>this.fieldItemMenu()); return; }
      this.p.items[k]--;
      const back=[];
      downed.forEach(key=>{ if(Math.random()<it.rate){ const st=this.p.allyState[key];
        st.hp=Math.max(1,Math.floor(st.maxHp/2)); back.push(ALLIES[key].name); } });
      audio.se(back.length?'levelup':'miss'); this.updateStrip(); this.closeCmd();
      if(back.length) this.message([`${it.name}を つかった。`, `${back.join('・')}が いきかえった！`]);
      else this.message([`${it.name}を つかった。`,'…しかし だれも いきかえらなかった。']);
      return;
    }
    if(it.type==='cure'){
      if(!this.p.status){ this.message(['いまは つかう ひつようが ない。'],()=>this.fieldItemMenu()); return; }
      this.p.items[k]--; this.p.status=''; line='じょうたいいじょうが なおった。';
      audio.se('heal'); this.updateStrip(); this.closeCmd(); this.message([`${it.name}を つかった。\n${line}`]); return;
    }
    this.p.items[k]--;
    if(it.type==='heal'){ const b=this.p.hp; this.p.hp=Math.min(this.p.maxHp,this.p.hp+it.amt); line=`HPが ${this.p.hp-b} かいふく した。`; }
    else { const b=this.p.mp; this.p.mp=Math.min(this.p.maxMp,this.p.mp+it.amt); line=`MPが ${this.p.mp-b} かいふく した。`; }
    audio.se('heal'); this.updateStrip(); this.closeCmd(); this.message([`${it.name}を つかった。\n${line}`]);
  },
  showStatus(){ const p=this.p; this.closeCmd();
    const job=JOBS[p.job]?JOBS[p.job].name:'ゆうしゃ';
    const pages=[];
    // 勇者（武器・よろい補正込みの実効値）
    pages.push(
      `★ ${job}  Lv${p.lv}\n`+
      `HP ${p.hp}/${p.maxHp}  MP ${p.mp}/${p.maxMp}\n`+
      `ちから ${this.atk()}  みのまもり ${this.def()}  すばやさ ${this.spd()}\n`+
      `ぶき：${GEAR[p.equip.weapon].name}\nよろい：${GEAR[p.equip.armor].name}\n`+
      `じゅもん：${p.spells.length?p.spells.map(s=>SPELLS[s].name).join('・'):'なし'}`
    );
    // 仲間（1人1ページ）
    p.party.forEach(key=>{
      const a=ALLIES[key], st=p.allyState[key];
      const fainted = st.hp<=0 ? '  （せんとうふのう）' : '';
      pages.push(
        `★ ${a.name}  Lv${st.lv}${fainted}\n`+
        `HP ${Math.max(0,st.hp)}/${st.maxHp}  MP ${st.mp}/${st.maxMp}\n`+
        `ちから ${st.atk}  みのまもり ${st.def}  すばやさ ${st.spd}\n`+
        `じゅもん：${st.spells.length?st.spells.map(s=>SPELLS[s].name).join('・'):'なし'}`
      );
    });
    this.message(pages);
  },

  renderCmd(box){ const el=document.getElementById(box); el.classList.add('show');
    el.style.display='block';
    el.innerHTML=this.cmdItems.map((it,i)=>`<div class="cmd-item ${i===this.cmdSel?'sel':''}" data-i="${i}">${it.label}</div>`).join('');
    el.querySelectorAll('.cmd-item').forEach(e=>e.onclick=()=>{ this.cmdSel=+e.dataset.i; this.confirmCmd(); });
  },
  confirmCmd(){ audio.se('select'); const it=this.cmdItems[this.cmdSel]; if(it) it.act(); },
  closeCmd(){ this.cmdCtx=''; this.cmdItems=[]; const c=document.getElementById('cmdBox'); c.classList.remove('show'); c.style.display='none'; },

  /* ---- 物語 ---- */
  queueStory(id){ const s=STORY.find(x=>x.id===id);
    if(!s||this.p.seen.includes(id)) return; this.p.seen.push(id); this.message(s.pages.slice());
  },

  /* ---- メッセージ ---- */
  message(arr,after){ this.msgQueue=arr.slice(); this.msgAfter=after||null;
    if(this.mode==='battle') this.showBattleUI('msg');
    else document.getElementById('msgBox').classList.add('show');
    this.showMsgPage();
  },
  // 続行インジケーターを消す
  clearMsgInd(){
    if(this._indTimer){ clearInterval(this._indTimer); this._indTimer=null; }
    const a=document.getElementById('msgInd'), b=document.getElementById('bMsgInd');
    if(a) a.innerHTML=''; if(b) b.innerHTML='';
  },
  // 続行インジケーターを表示。more=true ならまだ続く（▽点滅）、false なら最後（〇◎＋タップ）
  showMsgInd(more){
    this.clearMsgInd();
    const inB=this.mode==='battle';
    const el=document.getElementById(inB?'bMsgInd':'msgInd'); if(!el) return;
    if(more){
      el.innerHTML='<span class="more">▽</span><span class="tap-label float">TAP</span>';
    } else {
      el.innerHTML='<span class="tap-mark">〇</span><span class="tap-label float">TAP</span>';
      const mark=el.querySelector('.tap-mark'); let on=false;
      this._indTimer=setInterval(()=>{ on=!on; if(mark) mark.textContent=on?'◎':'〇'; }, 450);
    }
  },
  showMsgPage(){ const inB=this.mode==='battle';
    const txt=document.getElementById(inB?'bMsgText':'msgText');
    this.clearMsgInd();
    const full=this.msgQueue[0]; this._typeFull=full; this._typing=true; let i=0;
    const done=()=>{ txt.textContent=full; this._typing=false;
      // タイプ完了 → まだ次ページがあれば▽点滅、最後なら〇◎＋タップ
      this.showMsgInd(this.msgQueue.length>1);
      if(this.auto&&this.mode==='battle') this._autoAdv();
    };
    const tick=()=>{ if(!this._typing){ done(); return; }
      txt.textContent=full.slice(0,i);
      txt.insertAdjacentHTML('beforeend','<span class="msg-cursor">●</span>');
      if(i<full.length){ i++; setTimeout(tick,this.msgDelay); }
      else { done(); } };
    tick();
  },
  _autoAdv(){ clearTimeout(this._autoTimer);
    this._autoTimer=setTimeout(()=>{ if(this.auto&&!this._typing) this.advanceMsg(); }, 750); },
  advanceMsg(){ if(this._typing){ this._typing=false;
      document.getElementById(this.mode==='battle'?'bMsgText':'msgText').textContent=this._typeFull;
      this.showMsgInd(this.msgQueue.length>1); return; }
    this.clearMsgInd();
    this.msgQueue.shift();
    if(this.msgQueue.length){ this.showMsgPage(); return; }
    document.getElementById('msgBox').classList.remove('show');
    const after=this.msgAfter; this.msgAfter=null; if(after) after();
  },

  /* ===================== 戦闘（複数 vs 複数・素早さ順） =====================
     設計(Wikibooks準拠):
       - 全ユニット(味方+敵)を units[] にまとめ、毎ターン spd でソート→行動順
       - 各ユニットに side('ally'/'enemy'), done(行動済みフラグ), alive を持たせる
       - プレイヤーは生存味方ごとにコマンド入力→順に解決
  ====================================================================== */
  weaponAtk(){ return GEAR[this.p.equip.weapon]?.atk||0; },
  armorDef(){ return GEAR[this.p.equip.armor]?.def||0; },
  atk(){ return this.p.baseAtk + this.p.lv*3 + this.weaponAtk(); },
  def(){ return this.p.baseDef + this.p.lv*2 + this.armorDef(); },
  spd(){ return this.p.baseSpd + Math.floor(this.p.lv*0.5); },
  showBattleUI(which){
    document.getElementById('bMsg').style.display=which==='msg'?'block':'none';
    document.getElementById('bCmd').style.display=which==='cmd'?'block':'none';
    document.getElementById('bSub').style.display=which==='sub'?'block':'none';
  },

  // 戦闘画面の勇者の見た目：武器を装備しているときだけ剣つきにする
  heroBattleArt(){
    const p=this.p;
    const base=JOBS[p.job]?.art||'🧝';
    // 転職後（パラディン🛡️/ようしゃ⚔️）は固有アートを優先
    if(JOBS[p.job] && p.job!=='hero') return base;
    return (p.equip.weapon && p.equip.weapon!=='none') ? '🧝‍♂️⚔️' : base;
  },
  // 味方ユニットを現在の状態から構築（勇者＋仲間）
  buildAllies(){
    const p=this.p, allies=[];
    allies.push({ side:'ally', isHero:true, key:'hero', name:'ゆうしゃ', art:this.heroBattleArt(), lv:p.lv,
      hp:p.hp, maxHp:p.maxHp, mp:p.mp, maxMp:p.maxMp,
      trait:(JOBS[p.job]&&JOBS[p.job].trait)||null,
      atk:this.atk(), def:this.def(), spd:this.spd(), spells:p.spells.slice(), alive:p.hp>0, status:p.status||'' });
    p.party.forEach(key=>{
      const a=ALLIES[key], st=p.allyState[key];
      const noVitals=!!(a.noVitals||st.noVitals);
      allies.push({ side:'ally', isHero:false, key, name:a.name, art:a.art, lv:st.lv,
        hp:st.hp, maxHp:st.maxHp, mp:st.mp, maxMp:st.maxMp,
        atk:st.atk, def:st.def, spd:st.spd, spells:st.spells.slice(),
        noVitals, alive: noVitals ? true : st.hp>0,   // 姫はHP概念なし＝常に「いる」
        status:st.status||'' });
    });
    return allies;
  },
  // 戦闘終了時、味方ユニットの現在HP/MP/状態を永続データへ書き戻す
  syncAlliesBack(){
    this.allies.forEach(u=>{
      if(u.isDecoy) return;                 // デコイは戦闘限り（書き戻さない）
      if(u.isHero){ this.p.hp=Math.max(0,u.hp); this.p.mp=u.mp; this.p.status=u.alive?u.status:''; }
      else { const st=this.p.allyState[u.key]; if(!st) return; st.hp=Math.max(0,u.hp); st.mp=u.mp; st.status=u.alive?u.status:''; }
    });
  },

  startBattle(arg){
    // とくぎ効果を初期化（前の戦闘の持ち越し防止）
    this.guardAllTurns=0; this.provokeTurns=0; this.provokeTarget=null; this.loveTurns=0; this.lovePeak=false; this._decoyUsed=false;
    // arg: 敵キー1つ(ボス) または 敵キー配列(グループ)
    let keys = Array.isArray(arg)?arg:[arg];
    let f=this.p.map==='cave2'?1.15:(this.p.map==='cave1'?1.05:1);
    if(this.p.map==='tower') f=1+(this.p.towerFloor||1)*0.08; // 階が深いほど強い
    this.enemies = keys.map((key,i)=>{
      const b=ENEMIES[key]; let sc=b.boss?1:f;
      // 裏ボス アビスは 撃破するたび さらに強くなる（裏の裏ボス）
      let suffix='';
      if(key==='abyss'){
        const clears=this.p.flags.abyssClears||0;
        sc = 1 + clears*0.6;                 // 撃破ごとに +60%（後で調整しやすい係数）
        if(clears>0) suffix=' ＋'+clears;     // 名前に強化段階を付与
      }
      return { side:'enemy', key, name:b.name+suffix, art:b.art, boss:!!b.boss, spell:b.spell||null,
        form2:b.form2?Object.assign({},b.form2,{name:b.form2.name+suffix}):null, transformed:false,
        inflict:b.inflict||null,
        maxHp:Math.round(b.hp*sc), hp:Math.round(b.hp*sc),
        atk:Math.round(b.atk*sc), def:Math.round(b.def*sc), spd:b.spd||8,
        xp:Math.round(b.xp*sc), gold:Math.round(b.gold*sc), alive:true, slot:i };
    });
    this.allies = this.buildAllies();
    this.isBossBattle = this.enemies.some(e=>e.boss);
    this.isAbyssBattle = this.enemies.some(e=>e.key==='abyss');
    audio.se('encounter');
    audio.bgm(this.isAbyssBattle ? 'abyss1' : (this.isBossBattle?'boss':'battle')); this.mode='battle';
    document.getElementById('strip').classList.remove('show');
    document.getElementById('pad').classList.remove('show');
    this.closeCmd();
    document.getElementById('battle').classList.add('show');
    const bgType=(this.p.map==='tower')?'tower':((this.p.map==='cave1'||this.p.map==='cave2')?'cave':(this.p.map==='castle'?'castle':((this.p.map==='elf'||this.p.map==='elfcave')?'elf':'field')));
    document.getElementById('battle').dataset.bg=bgType;
    const ab=document.getElementById('bAuto');
    this.refreshAutoBtn();
    this.renderEnemies(); this.renderParty(); this.renderLoveGauge();
    const names=this.enemies.length===1?this.enemies[0].name
      : this.enemyCountLabel();
    this.message([`${names}が あらわれた！`],()=>this.startTurn());
  },
  enemyCountLabel(){
    // 同名をまとめて「スライム2ひき」のように
    const counts={};
    this.enemies.forEach(e=>counts[e.name]=(counts[e.name]||0)+1);
    return Object.entries(counts).map(([n,c])=>c>1?`${n} ${c}たい`:n).join('と');
  },

  aliveEnemies(){ return this.enemies.filter(e=>e.alive); },
  aliveAllies(){ return this.allies.filter(a=>a.alive); },
  // 敵の攻撃対象になり得る味方（HPを持たない姫は狙われない）
  targetableAllies(){ return this.allies.filter(a=>a.alive && !a.noVitals); },
  // 回復できる味方（姫・デコイは除外）
  healableAllies(){ return this.allies.filter(a=>a.alive && !a.noVitals && !a.isDecoy); },

  // ===== ターン開始：味方のコマンドを順に入力 =====
  startTurn(){
    // とくぎ持続の減算（ターン経過）
    if(this.guardAllTurns>0) this.guardAllTurns--;
    if(this.provokeTurns>0){
      this.provokeTurns--;
      if(this.provokeTurns<=0 && this.provokeTarget){
        this.provokeTarget._defBonus=Math.max(0,(this.provokeTarget._defBonus||0)-30);
        this.provokeTarget=null;
      }
    }
    // 「あい」モード（あいのうた）の持続
    if(this.loveTurns>0){
      this.loveTurns--;
      if(this.loveTurns<=0){
        const hero=this.allies.find(a=>a.isHero);
        if(hero && hero._loveTurns){
          if(hero._loveAtk){ hero.atk-=hero._loveAtk; hero._loveAtk=0; }
          if(hero._loveDef){ hero.def-=hero._loveDef; hero._loveDef=0; }
          if(hero._loveHpUp){ hero.maxHp-=hero._loveHpUp; if(hero.hp>hero.maxHp)hero.hp=hero.maxHp; hero._loveHpUp=0; }
          hero._loveTurns=0; hero._loveStat=null; hero._loveWeaponBoost=false; this.lovePeak=false;
          this.renderParty();
        }
      }
    }
    this.enemies.concat(this.allies).forEach(u=>u.done=false);
    this.renderEnemies(); // 倒した敵の表示を整理
    // コマンド入力待ちの味方（姫=noVitalsは手番を持たない。あいゲージ満タンで自動発動する）
    this.allyQueue = this.aliveAllies().filter(a=>!a.noVitals);
    // ターン開始時、あいゲージが満タンなら自動であいのうた発動
    this.tryAutoLoveSong();
    this.actions = []; // {actor, type, ...}
    this.inputNextAlly();
  },
  inputNextAlly(){
    // あいのうた自動発動（このターンの最初に一度だけ）
    if(this._pendingLoveSong){ this._pendingLoveSong=false;
      this.applyLoveSong(()=>this.inputNextAlly()); return;
    }
    if(this.allyQueue.length===0){ this.resolveTurn(); return; }
    this.curActor = this.allyQueue[0];
    // デコイ（分身）は自動で攻撃する
    if(this.curActor.isDecoy){
      const tgt=this.aliveEnemies().sort((x,y)=>x.hp-y.hp)[0];
      if(tgt) this.actions.push({ actor:this.curActor, type:'attack', target:tgt });
      this.allyQueue.shift(); this.inputNextAlly(); return;
    }
    // 眠っている味方は行動できない（起きる判定はターン解決時）
    if(this.curActor.status==='sleep'){
      this.actions.push({ actor:this.curActor, type:'asleep' });
      this.allyQueue.shift(); this.inputNextAlly(); return;
    }
    this.renderParty();
    if(this.auto){ this.autoChoose(); return; }
    this.battleMenu();
  },
  toggleAuto(){
    // 0:OFF → 1:AUTO(通常) → 2:AUTO(いのちだいじに) → 0...
    this.autoMode=((this.autoMode||0)+1)%3;
    this.auto=this.autoMode>0;
    this.autoCare=this.autoMode===2;
    this.refreshAutoBtn();
    audio.se('select');
    // コマンド入力待ちの最中にONにしたら、その場から自動進行を開始
    if(this.auto && this.mode==='battle' && this.cmdCtx==='battle' && this.curActor){
      this.closeBattleSub(); this.autoChoose();
    }
  },
  refreshAutoBtn(){
    const b=document.getElementById('bAuto'); if(!b) return;
    b.classList.toggle('on',!!this.auto);
    b.textContent = this.autoMode===2 ? 'いのち ▣' : (this.autoMode===1 ? 'AUTO ▣' : 'AUTO ▢');
  },
  closeBattleSub(){ this.cmdCtx=''; document.getElementById('bSub').style.display='none'; },
  // あいゲージを加算（姫が仲間にいるときだけ）。満タン100で頭打ち
  addLove(n){
    if(!this.p || !this.p.party || !this.p.party.includes('princess')) return;
    const before=this.p.loveGauge||0;
    this.p.loveGauge=Math.min(300, before + n);   // 最大300%まで
    if(this.mode==='field') this.updateStrip();
    if(this.mode==='battle') this.renderLoveGauge();
  },
  // 発動しきい値を 100→200→300→100 と切り替え（姫の名前タップ）
  cycleLoveLevel(){
    const cur=this.p.loveLevel||100;
    this.p.loveLevel = cur>=300?100:cur+100;
    audio.se('select');
    if(this.mode==='field') this.updateStrip();
    if(this.mode==='battle') this.renderLoveGauge();
  },
  // 戦闘ターン開始時：ゲージが「発動しきい値」に達していれば自動発動
  tryAutoLoveSong(){
    if(!this.p.party.includes('princess')) return;
    const need=this.p.loveLevel||100;
    if((this.p.loveGauge||0) < need) return;
    if(this.loveTurns>0) return;                   // 効果中は重ねない
    this._songLevel=need;                          // 発動した段階(100/200/300)を記録
    this.p.loveGauge -= need;                      // しきい値ぶん消費
    this._pendingLoveSong=true;
  },
  // あいのうたの効果を勇者に適用（段階：100/200/300）
  applyLoveSong(done){
    const hero=this.allies.find(a=>a.isHero);
    if(!hero){ if(done)done(); return; }
    const lvl=this._songLevel||100;
    const buffAtk = Math.random()<0.5;
    // 効果ターン：100=4 / 200・300=5
    const turns = lvl>=200 ? 5 : 4;
    hero._loveTurns=turns; hero._loveStat=buffAtk?'atk':'def';
    hero._loveHpUp=100; hero.maxHp+=100;
    if(buffAtk){ hero._loveAtk=100; hero.atk+=100; } else { hero._loveDef=100; hero.def+=100; }
    // 300%：武器強化（攻撃+20）＋確率系効果の反転
    const lines=[
      'フィーナは 「あいのうた」を うたいはじめた！',
      'やさしい しらべが せんじょうに ひびきわたる──',
      `ゆうしゃは 「あい」に めざめた！（${turns}ターン）`,
      'さいだいHPが 100 あがり、HPが ぜんかいふく！',
      buffAtk ? 'こうげきりょくが 100 あがった！' : 'ぼうぎょりょくが 100 あがった！'
    ];
    if(lvl>=200) lines.push('あいの ちからが たかまり、こうかじかんが のびた！');
    if(lvl>=300){
      hero._loveAtk=(hero._loveAtk||0)+20; hero.atk+=20;
      hero._loveWeaponBoost=true;            // 確率系効果の反転フラグ
      this.lovePeak=true;
      lines.push('💗さいだいの あい！ ぶきの ちからが かくせいし こうげき+20！');
      lines.push('ぶきの とくしゅこうかが はんてんし、はつどう しやすく なった！');
    }
    hero.hp=hero.maxHp; this.loveTurns=turns;
    audio.se('levelup'); this.fxHeal(); this.fxFuryOn&&this.fxFuryOn(); this.renderParty(); this.renderLoveGauge();
    this.message(lines,()=>{ if(done)done(); });
  },
  autoChoose(){
    const a=this.curActor;
    const healSpell = (a.spells||[]).find(s=>SPELLS[s].type==='heal');

    if(this.autoCare){
      // 「いのちだいじに」：回復魔法とバフ(とくぎ)以外は使わない
      // 1) 味方の誰かがHP6割以下なら回復を最優先（HPを持つ仲間のみ＝姫は除外）
      const hurtC = this.healableAllies().some(x=>x.hp<=x.maxHp*0.6);
      if(healSpell && hurtC && a.mp>=SPELLS[healSpell].mp){
        this.actions.push({ actor:a, type:'spell', spell:healSpell });
        this.allyQueue.shift(); this.inputNextAlly(); return;
      }
      // 2) バフのとくぎ（賢者かちこち＝被ダメ減 / 戦士ちょうはつ＝防御バフ）をまだ使っていなければ使う
      const skills=this.skillsFor(a);
      for(const k of skills){
        const s=SKILLS[k];
        if(k==='kachikochi'){
          if(this.guardAllTurns>0) continue;          // 効果中は重ねない
          if(s.mp && a.mp<s.mp) continue;
          this.actions.push({ actor:a, type:'skill', skill:k });
          this.allyQueue.shift(); this.inputNextAlly(); return;
        }
        if(k==='provoke'){
          if(a._provokeUsed) continue;                // 1戦闘1回
          this.actions.push({ actor:a, type:'skill', skill:k });
          this.allyQueue.shift(); this.inputNextAlly(); return;
        }
      }
      // 3) 回復もバフも不要／不可なら、攻撃呪文は使わず通常攻撃のみ（MP温存）
      const tgtC=this.aliveEnemies().sort((x,y)=>x.hp-y.hp)[0];
      this.actions.push({ actor:a, type:'attack', target:tgtC });
      this.allyQueue.shift(); this.inputNextAlly(); return;
    }

    // 通常オート: 回復役は味方がHP4割以下なら回復を優先（HPを持つ仲間のみ＝姫は除外）
    const hurt = this.healableAllies().some(x=>x.hp<=x.maxHp*0.4);
    if(healSpell && hurt && a.mp>=SPELLS[healSpell].mp){
      this.actions.push({ actor:a, type:'spell', spell:healSpell });
      this.allyQueue.shift(); this.inputNextAlly(); return;
    }
    // 攻撃呪文を使えるなら（MPに余裕があれば）優先
    const atkSpell = (a.spells||[]).find(s=>SPELLS[s].type==='dmg');
    if(atkSpell && a.mp>=SPELLS[atkSpell].mp && a.mp>a.maxMp*0.3){
      this.actions.push({ actor:a, type:'spell', spell:atkSpell, target:this.pick(this.aliveEnemies()) });
      this.allyQueue.shift(); this.inputNextAlly(); return;
    }
    // それ以外は通常攻撃（HPの低い敵を狙う）
    const tgt=this.aliveEnemies().sort((x,y)=>x.hp-y.hp)[0];
    this.actions.push({ actor:a, type:'attack', target:tgt });
    this.allyQueue.shift(); this.inputNextAlly();
  },
  battleMenu(){ this.cmdCtx='battle';
    const who=this.curActor.name;
    // 姫(noVitals)はあいのうたと防御のみ
    if(this.curActor.noVitals){
      this.cmdItems=[];
      if(this.skillsFor(this.curActor).length) this.cmdItems.push({label:'とくぎ',act:()=>this.cmdSkillMenu()});
      this.cmdItems.push({label:'ぼうぎょ',act:()=>{ this.actions.push({actor:this.curActor,type:'defend'}); this.allyQueue.shift(); this.inputNextAlly(); }});
      this.cmdSel=0; this.showBattleUI('cmd'); this.renderCmd('bCmd');
      document.getElementById('bMsgText').textContent='';
      return;
    }
    this.cmdItems=[
      {label:'たたかう',act:()=>this.cmdAttack()},
      {label:'じゅもん',act:()=>this.cmdSpellMenu()},
    ];
    if(this.skillsFor(this.curActor).length) this.cmdItems.push({label:'とくぎ',act:()=>this.cmdSkillMenu()});
    this.cmdItems.push(
      {label:'どうぐ',act:()=>this.cmdItemMenu()},
      {label:'にげる',act:()=>this.cmdFlee()},
    );
    this.cmdSel=0; this.showBattleUI('cmd'); this.renderCmd('bCmd');
    document.getElementById('bMsgText').textContent='';
  },
  // このユニットが使えるとくぎ一覧
  skillsFor(u){
    const out=[];
    if(u.key==='sage' && u.lv>=10) out.push('kachikochi');
    if(u.key==='warrior' && u.lv>=10) out.push('provoke');
    if(u.key==='princess') out.push('sing');
    return out;
  },
  battleA(){ if(this.cmdCtx==='battle') this.confirmCmd(); },

  // --- コマンド: 攻撃（対象選択へ） ---
  cmdAttack(){ this.chooseTarget(target=>{
    this.actions.push({ actor:this.curActor, type:'attack', target });
    this.allyQueue.shift(); this.inputNextAlly();
  }); },
  cmdSpellMenu(){
    const list=this.curActor.spells||[];
    if(!list.length){ this.message(['じゅもんを おぼえていない。'],()=>this.battleMenu()); return; }
    const box=document.getElementById('bSub'); this.showBattleUI('sub');
    box.innerHTML=list.map(s=>`<div class="cmd-item" data-s="${s}">${SPELLS[s].name}(${SPELLS[s].mp})</div>`).join('')+`<div class="cmd-item" data-back="1">もどる</div>`;
    box.querySelectorAll('.cmd-item').forEach(el=>el.onclick=()=>el.dataset.back?this.battleMenu():this.cmdSpellPick(el.dataset.s));
  },
  cmdSpellPick(k){
    const s=SPELLS[k];
    if(this.curActor.mp<s.mp){ this.message(['MPが たりない！'],()=>this.cmdSpellMenu()); return; }
    if(s.type==='heal'){
      // 回復は味方対象（負傷の多い味方を選ぶ：自動で最もHP割合低い味方）
      this.actions.push({ actor:this.curActor, type:'spell', spell:k });
      this.allyQueue.shift(); this.inputNextAlly();
    } else {
      this.chooseTarget(target=>{
        this.actions.push({ actor:this.curActor, type:'spell', spell:k, target });
        this.allyQueue.shift(); this.inputNextAlly();
      });
    }
  },
  cmdSkillMenu(){
    const list=this.skillsFor(this.curActor);
    if(!list.length){ this.battleMenu(); return; }
    const box=document.getElementById('bSub'); this.showBattleUI('sub');
    box.innerHTML=list.map(k=>{
      const s=SKILLS[k];
      const usedFlag=(k==='provoke'&&this.curActor._provokeUsed)||(k==='sing'&&this.curActor._singUsed);
      const used=!!(s.once && usedFlag);
      const lbl = used ? `${s.name}（つかえない）` : `${s.name}${s.mp?`(${s.mp})`:''}`;
      return `<div class="cmd-item" data-sk="${used?'':k}">${lbl}</div>`;
    }).join('')+`<div class="cmd-item" data-back="1">もどる</div>`;
    box.querySelectorAll('.cmd-item').forEach(el=>el.onclick=()=>{
      if(el.dataset.back) this.battleMenu();
      else if(el.dataset.sk) this.cmdSkillPick(el.dataset.sk);
    });
  },
  cmdSkillPick(k){
    const s=SKILLS[k], a=this.curActor;
    const usedFlag=(k==='provoke'&&a._provokeUsed)||(k==='sing'&&a._singUsed);
    if(s.once && usedFlag){ this.message(['この せんとうでは もう つかえない。'],()=>this.cmdSkillMenu()); return; }
    if(s.mp && a.mp<s.mp){ this.message(['MPが たりない！'],()=>this.cmdSkillMenu()); return; }
    this.actions.push({ actor:a, type:'skill', skill:k });
    this.allyQueue.shift(); this.inputNextAlly();
  },
  cmdItemMenu(){
    const keys=Object.keys(this.p.items).filter(k=>this.p.items[k]>0);
    if(!keys.length){ this.message(['どうぐが ない。'],()=>this.battleMenu()); return; }
    const box=document.getElementById('bSub'); this.showBattleUI('sub');
    box.innerHTML=keys.map(k=>`<div class="cmd-item" data-it="${k}">${ITEMS[k].name}(${this.p.items[k]})</div>`).join('')+`<div class="cmd-item" data-back="1">もどる</div>`;
    box.querySelectorAll('.cmd-item').forEach(el=>el.onclick=()=>el.dataset.back?this.battleMenu():this.cmdItemPick(el.dataset.it));
  },
  cmdItemPick(k){
    this.actions.push({ actor:this.curActor, type:'item', item:k });
    this.allyQueue.shift(); this.inputNextAlly();
  },
  cmdFlee(){
    if(this.isBossBattle){ this.message(['にげられない！'],()=>this.battleMenu()); return; }
    this.actions.push({ actor:this.curActor, type:'flee' });
    this.allyQueue.shift(); this.inputNextAlly();
  },

  // --- 敵をタップ or コマンドで選ぶ ---
  chooseTarget(cb){
    const targets=this.aliveEnemies();
    if(targets.length===1){ cb(targets[0]); return; }
    this.cmdCtx=''; this.showBattleUI('msg');
    document.getElementById('bMsgText').textContent='てきを えらんでください';
    const nodes=document.querySelectorAll('#bEnemies .b-unit');
    nodes.forEach(n=>{
      const slot=+n.dataset.slot; const e=this.enemies.find(x=>x.slot===slot);
      if(e&&e.alive){ n.classList.add('targetable');
        n.onclick=()=>{ nodes.forEach(x=>{x.classList.remove('targetable');x.onclick=null;}); cb(e); };
      }
    });
  },

  // ===== 解決フェーズ：素早さ順に全行動を処理 =====
  resolveTurn(){
    // 敵の行動を決定（生きてる敵全員ターゲットはランダムな生存味方）
    this.aliveEnemies().forEach(e=>{
      this.actions.push({ actor:e, type:'enemy' });
    });
    // 素早さソート（行動順配列）。逃走は最優先で処理
    this.actions.sort((a,b)=>{
      if(a.type==='flee'&&b.type!=='flee') return -1;
      if(b.type==='flee'&&a.type!=='flee') return 1;
      return b.actor.spd - a.actor.spd;
    });
    this.actIndex=0;
    this.showBattleUI('msg');
    this.nextAction();
  },
  nextAction(){
    // デコイが倒れていたら戦列から消す（消滅）
    const dead=this.allies.find(a=>a.isDecoy && !a.alive);
    if(dead){ this.allies=this.allies.filter(a=>!(a.isDecoy && !a.alive)); this.renderParty(); }
    // 勝敗判定
    if(this.aliveEnemies().length===0){ this.victory(); return; }
    if(this.healableAllies().length===0){ this.defeat(); return; }
    if(this.actIndex>=this.actions.length){ this.startTurn(); return; }
    const act=this.actions[this.actIndex++];
    const actor=act.actor;
    if(!actor.alive){ this.nextAction(); return; } // 行動前に倒れていたらスキップ
    // 毒: 行動前にダメージ
    if(actor.status==='poison' && actor.alive){
      const pd=Math.max(1,Math.floor(actor.maxHp*0.08));
      actor.hp-=pd; if(actor.hp<=0) actor.alive=false;
      this.renderParty(); if(actor.side==='enemy') this.renderEnemies();
      this.message([`${actor.name}は どくで ${pd}の ダメージ！`+(actor.alive?'':`\n${actor.name}は たおれた！`)],()=>{
        if(act.type==='asleep') this.resolveSleep(actor);
        else this.runAction(act);
      });
      return;
    }
    if(act.type==='asleep'){ this.resolveSleep(actor); return; }
    this.runAction(act);
  },
  runAction(act){
    const actor=act.actor;
    if(!actor.alive){ this.nextAction(); return; }
    if(act.type==='flee'){ this.doFlee(act); return; }
    if(act.type==='enemy'){ this.doEnemyAction(actor); return; }
    if(act.type==='attack'){ this.doAllyAttack(actor, act.target); return; }
    if(act.type==='spell'){ this.doAllySpell(actor, act.spell, act.target); return; }
    if(act.type==='item'){ this.doAllyItem(actor, act.item); return; }
    if(act.type==='skill'){ this.doAllySkill(actor, act.skill); return; }
    if(act.type==='defend'){
      this.message([`${actor.name}は みを まもっている。`],()=>this.cont()); return;
    }
    this.nextAction();
  },
  resolveSleep(actor){
    // 30%で目を覚ます、それ以外は眠ったまま
    if(Math.random()<0.35){ actor.status=''; this.renderParty();
      this.message([`${actor.name}は めを さました！`],()=>this.cont());
    } else {
      this.message([`${actor.name}は ねむっている…`],()=>this.cont());
    }
  },
  cont(){ this.nextAction(); }, // メッセージ送り後に次の行動へ

  doFlee(act){
    if(Math.random()<0.5){ audio.se('warp');
      this.message(['にげだした！'],()=>this.endBattle()); }
    else this.message([`${act.actor.name}は にげられなかった！`],()=>this.cont());
  },
  doAllyAttack(actor, target){
    if(!target.alive) target=this.aliveEnemies()[0]; // 対象が既に倒れていたら振り直し
    if(!target){ this.nextAction(); return; }
    // 勇者がブルトガング/アルマス装備なら多段攻撃（攻撃ごとに味方HP回復）
    if(actor.isHero && (this.p.equip.weapon==='balmung'||this.p.equip.weapon==='almace')){
      const hits=this.rollBalmungHits();
      this.doBalmungAttack(actor, target, hits, 1);
      return;
    }
    const miss=Math.random()<0.04;
    if(miss){ audio.se('miss'); this.fxTextOn('enemy',target.slot,'MISS','miss');
      this.message([`${actor.name}の こうげき！\nしかし ミスした！`],()=>this.cont()); return; }
    const crit=Math.random()<this.critChance(actor);
    let dmg=Math.max(1,actor.atk-target.def+this.randi(-2,2)); if(crit) dmg=Math.round(dmg*1.8);
    let furyLine='';
    if(this.furyActive(actor)){ dmg=Math.round(dmg*2); furyLine='\n🔥バーサーカーの ぶじ！ ダメージ2ばい！';
      audio.se('flame'); this.fxFuryOn(); }
    this.damageEnemy(target,dmg,crit,
      `${actor.name}の こうげき！\n${target.name}に ${dmg}の ダメージ！${crit?'（かいしんの いちげき！）':''}${furyLine}`);
  },
  // バーサーカーのfury発動エフェクト（炎の演出）
  fxFuryOn(){ const L=this.fxLayer();
    for(let i=0;i<14;i++){ const f=document.createElement('div'); f.className='fx fx-flame';
      f.style.left=(6+Math.random()*30)+'%'; f.style.top=(40+Math.random()*40)+'%';
      f.style.animationDelay=(i*0.025)+'s'; L.appendChild(f); setTimeout(()=>f.remove(),700); } },
  // バーサーカーのfury: HP30%以下で与ダメ2倍
  furyActive(actor){ return actor && actor.trait==='fury' && actor.alive && actor.hp<=actor.maxHp*0.30; },
  // ブルトガングの攻撃回数：2〜4回（2回が高確率）
  rollBalmungHits(){
    const r=Math.random();
    if(r<0.60) return 2;
    if(r<0.88) return 3;
    return 4;
  },
  // ブルトガングの回復量：10〜40（15付近が高確率）
  // 会心率：通常7%。300%「あい」で武器の確率効果が反転＝93%
  critChance(actor){
    if(actor && actor.isHero && actor._loveWeaponBoost) return 0.93;
    return 0.07;
  },
  rollBalmungHeal(){
    const r=Math.random();
    if(r<0.55) return 13+Math.floor(Math.random()*5);   // 13〜17
    if(r<0.80) return 10+Math.floor(Math.random()*3);   // 10〜12
    if(r<0.95) return 18+Math.floor(Math.random()*8);   // 18〜25
    return 26+Math.floor(Math.random()*15);             // 26〜40
  },
  // ブルトガングの多段攻撃を1ヒットずつ処理（ダメージ→回復 を回数分）
  doBalmungAttack(actor, target, hits, n){
    if(this.aliveEnemies().length===0){ this.cont(); return; }
    if(!target||!target.alive){ target=this.aliveEnemies()[0]; }
    if(!target){ this.cont(); return; }
    const head = (n===1) ? `${actor.name}の こうげき！（${hits}れんげき！）${this.furyActive(actor)?' 🔥ぶじ！':''}\n` : '';
    const crit=Math.random()<this.critChance(actor);
    let dmg=Math.max(1,actor.atk-target.def+this.randi(-2,2)); if(crit) dmg=Math.round(dmg*1.8);
    if(this.furyActive(actor)){ dmg=Math.round(dmg*2); if(n===1) this.fxFuryOn(); }
    // アルマス：光ダメージ50固定を上乗せ（防御無視）
    const lightDmg = (this.p.equip.weapon==='almace' && GEAR.almace.lightDmg) ? GEAR.almace.lightDmg : 0;
    if(lightDmg) dmg += lightDmg;
    audio.se('hit'); this.flashEnemyOn(target.slot); this.fxTextOn('enemy',target.slot,dmg,crit?'crit':'');
    target.hp-=dmg;
    // ボス第二形態への変身チェック（多段の途中でも一度だけ）
    if(target.hp<=0 && target.form2 && !target.transformed){
      this.transformBoss(target, `${head}${n}かいめ：${target.name}に ${dmg}の ダメージ！`); return;
    }
    let killed=false;
    if(target.hp<=0){ target.alive=false; killed=true; this.questProgress(target.key);
      const node=this.enemyNode(target.slot);
      if(node){ node.classList.add('dead'); const bar=node.querySelector('.b-uhp i'); if(bar) bar.style.width='0%'; }
    } else {
      const node=this.enemyNode(target.slot);
      const bar=node&&node.querySelector('.b-uhp i'); if(bar) bar.style.width=Math.max(0,target.hp/target.maxHp*100)+'%';
    }
    // 攻撃ごとの味方回復：最もHP割合の低い生存味方を回復（HPを持つ仲間のみ）
    // アルマスは100固定回復、ブルトガングはロール回復
    const heal=(this.p.equip.weapon==='almace') ? 100 : this.rollBalmungHeal();
    const tgt=this.healableAllies().sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    let healLine='';
    if(tgt){ const before=tgt.hp; tgt.hp=Math.min(tgt.maxHp,tgt.hp+heal); const h=tgt.hp-before;
      if(h>0){ this.fxHeal(); healLine=`\nまけんが ${tgt.name}の HPを ${h} かいふく！`; } }
    this.renderParty();
    const dmgLine=`${head}${n}かいめ：${target.name}に ${dmg}の ダメージ！${lightDmg?'（＋ひかり50）':''}${crit?'（かいしん！）':''}${killed?`\n${target.name}を たおした！`:''}${healLine}`;
    this.message([dmgLine],()=>{
      if(n<hits && this.aliveEnemies().length>0){ this.renderEnemies(); this.doBalmungAttack(actor, target, hits, n+1); }
      else { this.renderEnemies(); this.cont(); }
    });
  },
  doAllySpell(actor, key, target){
    const s=SPELLS[key]; actor.mp-=s.mp;
    if(s.type==='heal'){
      // 最もHP割合の低い生存味方を回復（HPを持つ仲間のみ＝姫は除外）
      const tgt=this.healableAllies().sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
      const before=tgt.hp; tgt.hp=Math.min(tgt.maxHp,tgt.hp+s.amt); const h=tgt.hp-before;
      audio.se('heal'); this.fxHeal(); this.renderParty();
      this.message([`${actor.name}は ${s.name}を となえた！\n${tgt.name}の HPが ${h} かいふく！`],()=>this.cont());
    } else {
      if(!target||!target.alive) target=this.aliveEnemies()[0];
      if(!target){ this.nextAction(); return; }
      const bonus = actor.key==='sage' ? 1.5 : 1;  // 賢者は呪文が強い
      const dmg=Math.max(1,Math.round((s.base+this.randi(-3,3))*bonus));
      audio.se('flame'); this.fxFlameOn(target.slot);
      this.damageEnemy(target,dmg,false,`${actor.name}は ${s.name}を となえた！\n${target.name}に ${dmg}の ダメージ！`);
    }
  },
  doAllyItem(actor, k){
    const it=ITEMS[k]; this.p.items[k]--;
    const hero=this.allies.find(a=>a.isHero);
    let line;
    if(it.type==='revive'){
      // 戦闘中の蘇生：HP0の味方ユニット全員を低確率で復活
      const downed=this.allies.filter(a=>!a.alive);
      const back=[];
      downed.forEach(a=>{ if(Math.random()<it.rate){ a.alive=true; a.hp=Math.max(1,Math.floor(a.maxHp/2)); back.push(a.name); } });
      audio.se(back.length?'levelup':'miss'); if(back.length) this.fxHeal(); this.renderParty();
      const msg = back.length
        ? `${actor.name}は ${it.name}を つかった。\n${back.join('・')}が いきかえった！`
        : `${actor.name}は ${it.name}を つかった。\n…しかし だれも いきかえらなかった。`;
      this.message([msg],()=>this.cont());
      return;
    }
    if(it.type==='heal'){ const b=hero.hp; hero.hp=Math.min(hero.maxHp,hero.hp+it.amt);
      line=`ゆうしゃの HPが ${hero.hp-b} かいふく！`; this.fxHeal(); }
    else if(it.type==='cure'){ hero.status=''; line='じょうたいいじょうが なおった！'; }
    else { const b=hero.mp; hero.mp=Math.min(hero.maxMp,hero.mp+it.amt); line=`ゆうしゃの MPが ${hero.mp-b} かいふく！`; }
    audio.se('heal'); this.renderParty();
    this.message([`${actor.name}は ${it.name}を つかった。\n${line}`],()=>this.cont());
  },
  doAllySkill(actor, k){
    const s=SKILLS[k];
    if(k==='kachikochi'){
      if(s.mp) actor.mp=Math.max(0,actor.mp-s.mp);
      this.guardAllTurns=3;                 // 味方全員、以後3ターン被ダメ20%カット
      audio.se('heal'); this.fxHeal(); this.renderParty();
      this.message([
        `${actor.name}は とくぎ 「かちこち」を となえた！`,
        'みかた ぜんいんの からだが かたく かがやいた！',
        '3ターン、うける ダメージが かるくなる。'
      ],()=>this.cont());
      return;
    }
    if(k==='provoke'){
      actor._provokeUsed=true;              // 1戦闘1回
      actor._defBonus=(actor._defBonus||0)+30; // 防御+30
      this.provokeTarget=actor;             // 敵の攻撃をこのユニットに集中
      this.provokeTurns=2;                  // 2ターン持続
      audio.se('select'); this.shakeStage(); this.renderParty();
      this.message([
        `${actor.name}は 「ちょうはつ」した！`,
        `${actor.name}に てきの こうげきが あつまる！`,
        `${actor.name}の ぼうぎょが おおきく あがった！（2ターン）`
      ],()=>this.cont());
      return;
    }
    if(k==='sing'){
      actor._singUsed=true;                 // 1戦闘1回
      const hero=this.allies.find(a=>a.isHero);
      if(!hero){ this.nextAction(); return; }
      // ゆうしゃの最大HP+100＆全回復、攻撃か防御ランダムで+100、4ターン「あい」モード
      const buffAtk = Math.random()<0.5;
      hero._loveTurns=4;
      hero._loveStat = buffAtk?'atk':'def';
      hero._loveHpUp=100; hero.maxHp+=100;
      if(buffAtk){ hero._loveAtk=100; hero.atk+=100; } else { hero._loveDef=100; hero.def+=100; }
      hero.hp=hero.maxHp;                    // 全回復
      this.loveTurns=4;                       // ステータス表記用
      audio.se('levelup'); this.fxHeal(); this.fxFuryOn&&this.fxFuryOn(); this.renderParty();
      this.message([
        `${actor.name}は 「あいのうた」を うたった！`,
        'やさしい しらべが せんじょうに ひびきわたる──',
        `ゆうしゃは 「あい」に めざめた！（4ターン）`,
        `さいだいHPが 100 あがり、HPが ぜんかいふく！`,
        buffAtk ? 'こうげきりょくが 100 あがった！' : 'ぼうぎょりょくが 100 あがった！'
      ],()=>this.cont());
      return;
    }
    this.nextAction();
  },
  doEnemyAction(enemy){
    // あぶないみずぎ装備中：低確率で敵を魅了し行動不能に
    const charmRate = GEAR[this.p.equip.armor] && GEAR[this.p.equip.armor].charm;
    if(charmRate && Math.random()<charmRate){
      audio.se('select');
      this.message([`${enemy.name}は ゆうしゃに みとれて うごけない！`],()=>this.cont());
      return;
    }
    let target;
    // デコイ（分身）が生きていれば、敵の攻撃はデコイに集中する
    const decoy=this.allies.find(a=>a.isDecoy && a.alive);
    if(decoy){
      target = (Math.random()<0.9) ? decoy : this.pick(this.targetableAllies());
    } else if(this.provokeTurns>0 && this.provokeTarget && this.provokeTarget.alive){
      target = (Math.random()<0.85) ? this.provokeTarget : this.pick(this.targetableAllies());
    } else {
      target=this.pick(this.targetableAllies());
    }
    if(!target){ this.nextAction(); return; }
    // ジェネラルの「かばう」：瀕死の仲間を高確率でかばい、被ダメ半分
    let coverMsg='';
    let coverCut=1;
    const general=this.aliveAllies().find(a=>a.trait==='cover');
    if(general && general!==target && target.hp<=target.maxHp*0.40 && Math.random()<0.80){
      coverMsg=`${general.name}が ${target.name}を かばった！\\n`;
      target=general;
      coverCut=0.5; // かばうと被ダメ半分
    }
    const tdef = target.def + (target._defBonus||0);
    const cut = (this.guardAllTurns>0 ? 0.8 : 1) * coverCut;  // かちこち20%カット × かばう半分
    this.enemyAtkMotionOn(enemy.slot);
    // 敵の呪文
    if(enemy.spell && Math.random()<0.35){
      const sp=SPELLS[enemy.spell] || {name:'やみのほのお',base:enemy.spell==='darkflame'?40:18};
      let dmg=Math.max(1,Math.round(((sp.base||20)+this.randi(-3,3)-Math.floor(tdef/3))*cut));
      target.hp-=dmg; if(target.hp<=0) target.alive=false;
      this.addLove(this.randi(8,16));   // 戦闘中の被ダメージ：あいゲージが よくたまる
      audio.se('flame'); this.shakeStage(); this.renderParty();
      this.message([coverMsg+`${enemy.name}は ${sp.name||'やみのほのお'}を となえた！\n${target.name}に ${dmg}の ダメージ！`+(target.alive?'':`\n${target.name}は たおれた！`)],()=>this.afterEnemyHit());
      return;
    }
    let dmg=Math.max(1,Math.round((enemy.atk-Math.floor(tdef/2)+this.randi(-2,2))*cut));
    target.hp-=dmg; if(target.hp<=0) target.alive=false;
    this.addLove(this.randi(8,16));   // 戦闘中の被ダメージ：あいゲージが よくたまる
    audio.se('damage'); this.shakeStage(); this.renderParty();
    let extra='';
    // 状態異常の付与（対象が生存・無状態のときのみ）
    if(target.alive && enemy.inflict && !target.status && Math.random()<enemy.inflict.rate){
      target.status=enemy.inflict.status;
      const sname={poison:'どく',sleep:'ねむり'}[target.status]||'いじょう';
      extra=`\n${target.name}は ${sname}に かかった！`;
    }
    this.message([coverMsg+`${enemy.name}の こうげき！\n${target.name}に ${dmg}の ダメージ！`+(target.alive?'':`\n${target.name}は たおれた！`)+extra],()=>this.afterEnemyHit());
  },
  // 敵の攻撃後：勇者がHP半分を切ったら しんぴのよろいの デコイを発動
  afterEnemyHit(){
    const hero=this.allies.find(a=>a.isHero);
    if(hero && hero.alive && !this._decoyUsed
       && GEAR[this.p.equip.armor] && GEAR[this.p.equip.armor].decoy
       && hero.hp>0 && hero.hp <= hero.maxHp*0.5){
      this.spawnDecoy(hero); return;
    }
    this.cont();
  },
  // デコイ（分身）を生成。勇者と同じステータス。回復不可・0で消滅・1戦闘1回
  spawnDecoy(hero){
    this._decoyUsed=true;
    const decoy={ side:'ally', isHero:false, isDecoy:true, key:'decoy', name:'ゆうしゃの ぶんしん',
      art:hero.art, lv:hero.lv, hp:hero.maxHp, maxHp:hero.maxHp, mp:0, maxMp:0,
      atk:hero.atk, def:hero.def, spd:hero.spd, spells:[], alive:true, status:'' };
    this.allies.push(decoy);
    audio.se('levelup'); this.renderParty();
    this.message([
      'しんぴの よろいが ひかりを はなった！',
      'ゆうしゃの ぶんしんが あらわれた！',
      'てきの こうげきは ぶんしんに あつまる！（かいふくは できない）'
    ],()=>this.cont());
  },

  damageEnemy(target,dmg,crit,msg){
    // 先に「今の」対象ノードへ演出を乗せる（renderで作り直す前に）
    audio.se('hit');
    this.flashEnemyOn(target.slot); this.fxTextOn('enemy',target.slot,dmg,crit?'crit':'');
    target.hp-=dmg;
    // ★ボスの第二形態：HP0でも倒れず「真の姿」に変身（一度だけ）
    if(target.hp<=0 && target.form2 && !target.transformed){
      this.transformBoss(target,msg); return;
    }
    if(target.hp<=0){ target.alive=false;
      this.questProgress(target.key);
      const node=this.enemyNode(target.slot);
      if(node){ node.classList.add('dead'); // HPバーだけ即0に
        const bar=node.querySelector('.b-uhp i'); if(bar) bar.style.width='0%'; }
      this.message([msg+`\n${target.name}を たおした！`],()=>{ this.renderEnemies(); this.cont(); });
    } else {
      const node=this.enemyNode(target.slot);
      const bar=node&&node.querySelector('.b-uhp i'); if(bar) bar.style.width=Math.max(0,target.hp/target.maxHp*100)+'%';
      this.message([msg],()=>this.cont());
    }
  },
  // ボスを第二形態へ変身させる
  transformBoss(target,msg){
    target.transformed=true;
    target.hp=target.maxHp;          // HP全回復
    target.atk=Math.round(target.atk*1.3);
    target.def=target.def+10;
    target.spd=target.spd+6;
    target.name=target.form2.name;   // 名前変更
    if(target.form2.art) target.art=target.form2.art;
    if(target.form2.spell) target.spell=target.form2.spell;
    if(target.form2.inflict) target.inflict=target.form2.inflict;
    audio.se('damage'); this.shakeStage();
    audio.bgm(target.key==='abyss' ? 'abyss2' : 'garzos2');
    const fallName = target.key==='blight' ? 'おおもとの やみ' : 'ガルゾス';
    this.message([msg, `${fallName}は たおれた…`,'…かに みえた！','やみの ちからが あふれだす！',`${target.name}が しんの すがたを あらわした！`],()=>{
      this.renderEnemies(); this.cont();
    });
  },

  victory(){
    if(this.isBossBattle){
      this.syncAlliesBack();
      const isAbyss = this.enemies.some(e=>e.key==='abyss');
      if(isAbyss){ this.p.flags.abyssCleared=true; this.abyssEnding(); return; }
      const isElf = this.enemies.some(e=>e.key==='blight');
      if(isElf){ this.p.flags.elfCleared=true; this.elfEnding(); return; }
      this.p.flags.won=true; this.ending(); return;
    }
    audio.se('win'); this.syncAlliesBack();
    this.addLove(this.randi(30,55));   // 戦闘勝利：あいゲージが もっともたまる
    const totalXp=this.enemies.reduce((s,e)=>s+e.xp,0);
    const totalGold=this.enemies.reduce((s,e)=>s+e.gold,0);
    this.p.gold+=totalGold;
    const heroDown = this.p.hp<=0;
    if(!heroDown) this.p.xp+=totalXp;   // HP0のキャラには経験値が入らない
    const msgs=[`まものを やっつけた！`,`けいけんち ${heroDown?0:totalXp}  ◈${totalGold}を てにいれた。`];
    if(heroDown) msgs.push('たおれた もの には けいけんちが はいらない…');
    const lv=this.checkLevel(); if(lv) msgs.push(...lv);
    // 賢者の蘇生: 賢者が仲間にいて生存、HP0の仲間が残っていたら蘇生
    const reviveMsgs=this.sageRevive();
    if(reviveMsgs.length) msgs.push(...reviveMsgs);
    // エルフのかご：戦闘後、味方全員のHPを30回復
    const basketMsgs=this.tickElfBasket();
    if(basketMsgs.length) msgs.push(...basketMsgs);
    // ひのきのぼうきれ装備中：戦闘ごとにカウント。100回でブルトガングに覚醒
    const twigMsgs=this.tickTwig();
    if(twigMsgs.length) msgs.push(...twigMsgs);
    this.updateStrip(); this.message(msgs,()=>this.endBattle());
  },
  // エルフのかご：戦闘後、生存している味方全員のHPを30回復
  tickElfBasket(){
    const p=this.p;
    if(!p.flags.elfBasket) return [];
    const HEAL=30; const names=[];
    // 勇者（生存時のみ）
    if(p.hp>0 && p.hp<p.maxHp){ const b=p.hp; p.hp=Math.min(p.maxHp,p.hp+HEAL); if(p.hp>b) names.push('ゆうしゃ'); }
    // 仲間（生存時のみ）
    p.party.forEach(key=>{ const st=p.allyState[key];
      if(st && st.hp>0 && st.hp<st.maxHp){ const b=st.hp; st.hp=Math.min(st.maxHp,st.hp+HEAL); if(st.hp>b) names.push(ALLIES[key].name); }
    });
    if(!names.length) return [];
    audio.se('heal');
    return [`エルフのかごの ちからで みかたの HPが ${HEAL} かいふくした！`];
  },
  // ひのきのぼうきれの戦闘カウントを進める。100回で覚醒
  tickTwig(){
    const p=this.p;
    // ひのきのえだ（クエスト2）：200戦カウント
    if(p.equip.weapon==='branch'){
      p.flags.branchBattles=(p.flags.branchBattles||0)+1;
      const left=200-p.flags.branchBattles;
      if(left>0) return [`ひのきの えだが かすかに ふるえている…（あと ${left}かい）`];
      return ['ひのきの えだが つよく ふるえた！','どくろの ところへ もどろう…'];
    }
    if(p.equip.weapon!=='twig') return [];
    p.flags.twigBattles=(p.flags.twigBattles||0)+1;
    const left=100-p.flags.twigBattles;
    if(left>0){
      return [`ひのきのぼうきれが かすかに ふるえている…（あと ${left}かい）`];
    }
    // 覚醒
    p.equip.weapon='balmung';
    if(!p.ownedGear.includes('balmung')) p.ownedGear.push('balmung');
    p.flags.cursed=true; // ブルトガングも外せない（呪い武器）
    audio.se('win');
    return ['ひのきのぼうきれが まばゆく かがやいた！','…これは ただの ぼうきれ などではない！','でんせつの まけん「ブルトガング」だった！','こうげきりょくが おおきく あがった！'];
  },
  // 賢者がHP0の仲間（勇者含む）を蘇生。賢者がいない/賢者がHP0なら何もしない
  sageRevive(){
    const p=this.p;
    if(!p.party.includes('sage')) return [];
    const sage=p.allyState['sage'];
    if(!sage || sage.hp<=0) return []; // 賢者自身が倒れていたら不可
    const out=[];
    // 蘇生対象を集める（勇者＋仲間、ただし賢者本人は除外＝生存中なので対象外）
    const downed=[];
    if(p.hp<=0) downed.push('hero');
    p.party.forEach(key=>{ if(key!=='sage' && p.allyState[key].hp<=0) downed.push(key); });
    if(downed.length===0) return [];
    out.push('けんじゃ「しかたないのぉ～ ホレっ」');
    downed.forEach(key=>{
      if(key==='hero'){ p.hp=Math.floor(p.maxHp/2); out.push(`ゆうしゃは いきかえった！`); }
      else { const st=p.allyState[key]; st.hp=Math.floor(st.maxHp/2); out.push(`${ALLIES[key].name}は いきかえった！`); }
    });
    audio.se('heal');
    return out;
  },
  checkLevel(){ const out=[]; let need=NEED_XP(this.p.lv);
    while(this.p.xp>=need){ this.p.xp-=need; this.p.lv++;
      this.p.maxHp+=8; this.p.maxMp+=4; this.p.baseAtk+=1; this.p.baseDef+=1;
      this.p.hp=this.p.maxHp; this.p.mp=this.p.maxMp;
      out.push(`ゆうしゃの レベルが ${this.p.lv}に あがった！`);
      const l=LEARN[this.p.lv]; if(l&&!this.p.spells.includes(l)){ this.p.spells.push(l); out.push(`じゅもん「${SPELLS[l].name}」を おぼえた！`); }
      need=NEED_XP(this.p.lv);
    }
    // 仲間の成長: 戦闘終了時にHP0の仲間は経験値が入らない（=成長も蘇生もしない）。
    // 生き残っている仲間のみ勇者レベルに追従し、実際にレベルが上がった本人だけ全回復する。
    this.p.party.forEach(key=>{
      const st=this.p.allyState[key], a=ALLIES[key];
      if(st.hp<=0) return;              // 倒れている仲間は経験値が入らない→レベルアップしない
      let leveled=false;
      while(st.lv<this.p.lv){ st.lv++; leveled=true;
        st.maxHp+=6; st.maxMp+=(a.maxMp>0?3:0); st.atk+=1; st.def+=1;
        const learn=a.learn&&a.learn[st.lv];
        if(learn && !st.spells.includes(learn)){ st.spells.push(learn); out.push(`${a.name}は じゅもん「${SPELLS[learn].name}」を おぼえた！`); }
      }
      if(leveled){
        st.hp=st.maxHp; st.mp=st.maxMp;  // レベルが上がった本人だけ全回復
        out.push(`${a.name}の レベルが ${st.lv}に あがった！`);
      }
    });
    if(out.length) audio.se('levelup'); return out.length?out:null;
  },
  defeat(){ this.syncAlliesBack();
    audio.stopBgm(); audio.se('defeat');
    const needWarrior = !this.p.flags.joinWarrior;
    // 戦闘画面では全滅の事実だけ表示
    this.message(['パーティは ぜんめつした…','きづくと きょうかいに いた。','しょじきんが はんぶんに なった。'],()=>{
      this.p.gold=Math.floor(this.p.gold/2);
      this.p.hp=this.p.maxHp; this.p.mp=this.p.maxMp;
      this.p.party.forEach(key=>{ const st=this.p.allyState[key]; st.hp=st.maxHp; st.mp=st.maxMp; });
      this.tower=null; this.p.towerReturn=null;
      // 神官が諭したので、後で町に入っても明るい噂アナウンスは出さない
      if(needWarrior && !this.p.seen.includes('town1first')) this.p.seen.push('town1first');
      this.p.map='town1'; this.p.x=10; this.p.y=5; this.p.dir='up';
      this.endBattle();
      // 町に着いてから神官が諭す（せんし未加入時のみ）
      if(needWarrior) this.message(['しんかん「ひとりでは むりも ある。」','しんかん「この まちで なかまを さがしては どうかな?」']);
    }); },
  endBattle(){ this.enemies=null; this.allies=null; this.cmdCtx=''; audio.bgm(this.bgmFor());
    document.getElementById('battle').classList.remove('show'); this.enterField();
  },
  ending(){ audio.stopBgm(); audio.se('win');
    document.getElementById('battle').classList.remove('show'); this.mode='message';
    document.getElementById('msgBox').classList.add('show');
    // ガルゾス撃破フラグ→城に姫が並ぶ
    this.p.flags.won=true;
    // 城へ転送（救出後の演出舞台）
    this.p.map='castle'; this.p.x=5; this.p.y=4; this.p.dir='down';
    this.message([
      '闇の王 ガルゾスは ひかりとなって きえさった…',
      'ろうやの おくから フィーナひめを すくいだした。',
      'まばゆい ひかりが ふたりを つつむ──',
      '…きづくと、そこは アルディアじょうの だいひろま だった。',
    ],()=>{ audio.bgm('castle'); this.draw(); this.setPlace();
      this.message([
        'アルディアおう「おお、ゆうしゃ よ！ よくぞ せかいを すくった！」',
        'フィーナ「ありがとう ございます、ゆうしゃ さま。」',
        'フィーナ「あなたは わたしたちの きぼうです。」',
        'せかいに ひかりが もどり、ひとびとは よろこびに わいた。',
      ],()=>this.elfPlea());
    });
  },
  // エルフの「助けて」の声 → 世界樹の危機 → はい/いいえ
  elfPlea(){
    audio.stopBgm();
    this.message([
      '──と、そのとき。',
      'どこからともなく かぼそい こえが ひびいた。',
      '「…たすけて……ゆうしゃ さま……」',
      '「われらは エルフ。とおい もりの たみ。」',
      '「せかいじゅが かれ、われらの くにが きえようと しています。」',
      '「やみの ねが せかいじゅの ねもとを むしばんで いるのです。」',
      'フィーナ「ゆうしゃ さま…どうか、エルフの くにを すくって あげて。」',
      'エルフの くにへ むかいますか？',
    ],()=>{
      this.cmdCtx='field';
      this.cmdItems=[
        {label:'はい むかう',act:()=>{ this.closeCmd(); this.elfAccept(); }},
        {label:'いいえ',act:()=>{ this.closeCmd(); this.elfDecline(); }},
      ]; this.cmdSel=0; this.renderCmd('cmdBox');
    });
  },
  // 「はい」: クエスト受諾。城に戻り、塔20階に入口が出現するようになる
  elfAccept(){
    this.p.flags.won=true;
    this.p.flags.elfQuest=true;
    audio.se('levelup');
    this.message([
      'ゆうしゃは うなずいた。',
      'フィーナ「ありがとう…！ あなたなら きっと。」',
      'アルディアおう「エルフの くにへの みちは とざされて おる。」',
      'アルディアおう「だが むげんの とう、その 20かいに──」',
      'アルディアおう「いせかいへの もんが ひらく という いいつたえが ある。」',
      'フィーナ「むげんの とうを のぼり、エルフの くにへ。」',
      '― あたらしい ぼうけんが はじまる ―',
    ],()=>{
      // 城のフィールドに戻して操作可能に（リロードしない＝冒険継続）
      this.p.map='world'; this.p.x=10; this.p.y=4; this.p.dir='down';
      this.save(); this.enterField(); audio.bgm(this.bgmFor());
      this.message(['むげんの とうの 20かいを めざそう。','とうの 20かいで 「エルフのくに」を えらべる。']);
    });
  },
  // 「いいえ」: 別の者が現れ、姫がついていく。姫は画面から消える
  elfDecline(){
    audio.stopBgm();
    this.message([
      'ゆうしゃは くびを よこに ふった。',
      'フィーナ「…そう、ですか。」',
      'やがて きたの もりから、ひとりの わかものが あらわれた。',
      'わかもの「エルフの こえは きいた。…わたしが むかいます。」',
      'フィーナ「あなたは…！」',
      'フィーナ「わたしも ついていきます。」',
      'フィーナ「ゆうしゃ さま、いままで ありがとう ございました。」',
    ],()=>{
      // 姫が去る：城の表示から姫を消す
      this.p.flags.princessLeft=true;
      this.p.flags.won=true;            // 物語は進行（クリア扱い）
      audio.se('warp');
      // 城を再描画して、姫が消えた様子を見せる
      if(this.p.map==='castle') this.draw();
      this.message([
        'フィーナは わかものと ともに もりへ きえていった。',
        'だいひろまには、おうと あなただけが のこされた。',
        'のこされた あなたの ぼうけんは、ここで しずかに とじた。',
        'そして、でんせつが　はじまる',
      ],()=>{ this.save(); location.reload(); });
    });
  },
  // エルフ国ボス撃破後：女王のもとへ転送→会話→帰還の扉が世界樹近くに出現
  elfEnding(){ audio.stopBgm(); audio.se('win');
    document.getElementById('battle').classList.remove('show'); this.mode='message';
    document.getElementById('msgBox').classList.add('show');

    this.p.map='elf'; this.p.x=6; this.p.y=7; this.p.dir='up';
    this.message([
      'せかいじゅを むしばむ やみの ねは ついえさった。',

      'まばゆい ひかりに つつまれ、ゆうしゃは せかいじゅの まえへ いざなわれた。',
    ],()=>{ audio.bgm('elf'); this.draw(); this.setPlace();
      this.message([
        'エルフの じょおう「ひかりの ゆうしゃ よ。よくぞ もどって きました。」',
        'エルフの じょおう「わたくしは この もりを おさめる じょおう。」',
        'エルフの じょおう「なんじの ゆうきが、せかいじゅを すくいました。」',
        'エルフの じょおう「もりの たみ いちどう、こころより かんしゃ します。」',
        'エルフの じょおう「なんじの なは、この もりに えいえんに きざまれよう。」',
        'エルフの じょおう「さあ、せかいじゅに むかって ください。」',
        'エルフの じょおう「そこに、なんじの くにへ もどる とびらが あらわれる でしょう。」',
      ],()=>{
        // 帰還の扉を出現させ、フィールド操作に確実に戻す
        this.p.flags.elfReturnDoor=true;
        audio.bgm(this.bgmFor());
        this.message(['せかいじゅの ねもとに、ひかりの とびらが あらわれた。','とびらに ふれれば、もとの くにへ もどれる。'],()=>{
          this.enterField();   // メッセージを閉じた後に field へ（方向キーが効くように）
          this.save();
        });
      });

  },

  /* ---- 戦闘の描画 ---- */
  renderEnemies(){
    const wrap=document.getElementById('bEnemies'); wrap.innerHTML='';
    const living=this.enemies.filter(e=>e.alive);
    const size = living.length>=3?64:(living.length===2?80:96);
    living.forEach(e=>{
      const d=document.createElement('div'); d.className='b-unit';
      d.dataset.slot=e.slot;
      d.innerHTML=`<div class="b-art" style="font-size:${size}px;height:${size}px">${e.art}</div>
        <div class="b-uname">${e.name}</div>
        <div class="b-uhp"><div class="bar"><i style="width:${Math.max(0,e.hp/e.maxHp*100)}%"></i></div></div>`;
      wrap.appendChild(d);
    });
  },
  // あいゲージの戦闘表示を更新
  renderLoveGauge(){
    const box=document.getElementById('bLove'); if(!box) return;
    const has=this.p&&this.p.party&&this.p.party.includes('princess');
    box.style.display = has ? 'flex' : 'none';
    if(!has) return;
    const g=Math.max(0,Math.min(300,this.p.loveGauge||0));
    const lvl=this.p.loveLevel||100;
    const fill=document.getElementById('bLoveFill'); if(fill) fill.style.width=Math.min(100,g/3)+'%';
    const lab=document.getElementById('bLoveLabel'); if(lab) lab.textContent=`💗あい ${g}% [${lvl}]`;
    box.classList.toggle('full', g>=lvl);
    box.style.cursor='pointer';
    box.onclick=(e)=>{ e.stopPropagation(); this.cycleLoveLevel(); };
  },
  renderParty(){
    const wrap=document.getElementById('bParty'); wrap.innerHTML='';
    const stIcon={poison:'☠',sleep:'💤',paralyze:'⚡'};
    this.allies.forEach(a=>{
      const active=(this.curActor&&this.curActor===a&&this.cmdCtx==='battle');
      const d=document.createElement('div');
      d.className='p-unit'+(active?' active':'')+(a.alive?'':' downed');
      // 姫(noVitals)はHP/MPを持たない＝名前枠だけ表示（別レイアウト）
      if(a.noVitals){
        d.className+=' p-novital';
        d.innerHTML=`<div class="pn">${a.name} <span class="pn-lv">♪</span></div>
          <div class="pn-role">うたいて</div>`;
        wrap.appendChild(d); return;
      }
      const mpLine=a.maxMp>0?`<div>MP ${a.mp}/${a.maxMp}</div><div class="hbar mp"><i style="width:${a.mp/a.maxMp*100}%"></i></div>`:'';
      const badge=a.status&&a.alive?` <span style="color:#c5f">${stIcon[a.status]||''}</span>`:'';
      // バーサーカー：HP75%以下でゲージが変色し、30%以下(fury発動圏)でさらに強調
      const ratio=a.hp/a.maxHp;
      let hpCls='hbar hp';
      let furyTag='';
      if(a.trait==='fury' && a.alive){
        if(ratio<=0.30){ hpCls+=' fury-on'; furyTag=' <span class="fury-badge">🔥ぶじ</span>'; }
        else if(ratio<=0.75){ hpCls+=' fury-warn'; }
      }
      // 「あい」モード中の勇者にラベル
      let loveTag='';
      if(a.isHero && a._loveTurns>0){ loveTag=` <span class="love-badge">💗あい(${this.loveTurns})</span>`; }
      d.innerHTML=`<div class="pn">${a.name} <span class="pn-lv">Lv${a.lv}</span>${badge}${furyTag}${loveTag}</div>
        <div>HP ${Math.max(0,a.hp)}/${a.maxHp}</div>
        <div class="${hpCls}"><i style="width:${Math.max(0,ratio*100)}%"></i></div>${mpLine}`;
      wrap.appendChild(d);
    });
  },

  /* ---- 戦闘エフェクト（slot指定対応） ---- */
  enemyNode(slot){ return document.querySelector(`#bEnemies .b-unit[data-slot="${slot}"]`); },
  flashEnemyOn(slot){ const n=this.enemyNode(slot); if(n){ n.classList.remove('hit'); void n.offsetWidth; n.classList.add('hit'); }
    const f=document.getElementById('bFlash'); f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); },
  enemyAtkMotionOn(slot){ const n=this.enemyNode(slot); if(n){ n.classList.remove('atk'); void n.offsetWidth; n.classList.add('atk'); } },
  shakeStage(){ const s=document.getElementById('bShake');
    s.classList.remove('shake'); void s.offsetWidth; s.classList.add('shake'); },
  fxLayer(){ return document.getElementById('bShake'); },
  fxTextOn(sideType,slot,val,cls){
    const L=this.fxLayer(); const d=document.createElement('div');
    d.className='fx fx-dmg '+(cls||''); d.textContent=val;
    const n=this.enemyNode(slot);
    if(n){ const r=n.getBoundingClientRect(), lr=L.getBoundingClientRect();
      d.style.left=(r.left-lr.left+r.width/2)+'px'; d.style.top=(r.top-lr.top+10)+'px'; }
    else { d.style.left='50%'; d.style.top='32%'; }
    L.appendChild(d); setTimeout(()=>d.remove(),1000);
  },
  fxFlameOn(slot){ const L=this.fxLayer(); const n=this.enemyNode(slot);
    let cx=50,cy=32;
    if(n){ const r=n.getBoundingClientRect(), lr=L.getBoundingClientRect();
      cx=(r.left-lr.left+r.width/2)/lr.width*100; cy=(r.top-lr.top+r.height/2)/lr.height*100; }
    for(let i=0;i<10;i++){ const f=document.createElement('div'); f.className='fx fx-flame';
      f.style.left=(cx-6+Math.random()*12)+'%'; f.style.top=(cy-6+Math.random()*12)+'%';
      f.style.animationDelay=(i*0.03)+'s'; L.appendChild(f); setTimeout(()=>f.remove(),700); } },
  fxHeal(){ const L=this.fxLayer();
    for(let i=0;i<8;i++){ const s=document.createElement('div'); s.className='fx fx-spark';
      s.style.left=(8+Math.random()*30)+'%'; s.style.top=(8+Math.random()*30)+'%';
      s.style.animationDelay=(i*0.05)+'s'; L.appendChild(s); setTimeout(()=>s.remove(),900); } },

  /* ---- 店 ---- */
  openShop(type){ this.shopType=type; const s=SHOPS[type];
    document.getElementById('shop').classList.add('show');
    document.getElementById('shopTitle').textContent=s.title; this.renderShop(); },
  renderShop(){ const s=SHOPS[this.shopType];
    document.getElementById('shopGold').textContent=this.p.gold;
    const list=document.getElementById('shopList'); list.innerHTML='';
    s.goods.forEach((g,i)=>{
      let name,det,price,owned=false;
      if(g.kind==='gear'){ const ge=GEAR[g.id]; name=ge.name; price=ge.price;
        det=ge.slot==='weapon'?`こうげき+${ge.atk}`:`しゅび+${ge.def}`;
        owned=this.p.ownedGear.includes(g.id);
      } else { const it=ITEMS[g.id]; name=it.name; price=it.price; det=it.desc; }
      const row=document.createElement('div'); row.className='shop-row';
      const btn=owned?`<span style="color:#888;font-size:12px">しょゆうずみ</span>`:`<button class="buy" data-i="${i}">かう</button>`;
      row.innerHTML=`<div><b>${name}</b><small>${det}</small></div><div style="display:flex;align-items:center"><span class="price">◈${price}</span>${btn}</div>`;
      list.appendChild(row);
    });
    list.querySelectorAll('.buy').forEach(b=>b.onclick=()=>this.buy(+b.dataset.i));
  },
  buy(i){ const g=SHOPS[this.shopType].goods[i];
    const price = g.kind==='gear'?GEAR[g.id].price:ITEMS[g.id].price;
    if(this.p.gold<price){ this.toast('おかねが たりない'); return; }
    if(g.kind==='gear'){
      if(this.p.ownedGear.includes(g.id)){ this.toast('もう もっている'); return; }
      this.p.gold-=price; audio.se('coin');
      this.p.ownedGear.push(g.id);
      // 買ったら自動装備
      const slot=GEAR[g.id].slot; this.p.equip[slot]=g.id;
      this.toast(`${GEAR[g.id].name}を そうび した`);
    } else {
      this.p.gold-=price; audio.se('coin');
      this.p.items[g.id]=(this.p.items[g.id]||0)+1; this.toast(`${ITEMS[g.id].name}を かった`);
    }
    this.renderShop(); this.updateStrip();
  },
  closeShop(){ document.getElementById('shop').classList.remove('show'); },

  /* ===================== ドット絵 描画 ===================== */
  draw(){
    if(this.mode==='title') return;
    const ctx=this.ctx,t=this.tile,m=this.curMap(),half=Math.floor(VIEW/2);
    const camX=this.p.x-half, camY=this.p.y-half;
    ctx.clearRect(0,0,t*VIEW,t*VIEW);
    for(let vy=0;vy<VIEW;vy++) for(let vx=0;vx<VIEW;vx++){
      const mx=camX+vx,my=camY+vy,px=vx*t,py=vy*t;
      let ch=' ';
      if(my>=0&&my<m.rows.length&&mx>=0&&mx<m.rows[0].length) ch=m.rows[my][mx];
      else { ctx.fillStyle='#000'; ctx.fillRect(px,py,t,t); continue; }
      this.drawTile(ctx,ch,px,py,t,m.indoor,mx,my);
    }
    // 宝箱
    (CHESTS.filter(c=>c.map===this.p.map)).forEach(c=>{
      if(this.chestTaken(c.id)) return;
      const vx=c.x-camX,vy=c.y-camY;
      if(vx>=0&&vx<VIEW&&vy>=0&&vy<VIEW) this.dotChest(ctx,vx*t,vy*t,t);
    });
    // マップ切替タイル（出口・階段・建物入口）：点滅させず別色で常時表示
    WARPS.filter(w=>w.map===this.p.map).forEach(w=>{
      const vx=w.x-camX,vy=w.y-camY;
      if(vx<0||vx>=VIEW||vy<0||vy>=VIEW) return;
      const ch = (m.rows[w.y]&&m.rows[w.y][w.x])||' ';
      this.drawWarpTile(ctx,vx*t,vy*t,t,ch);
    });
    // NPC
    (this.visibleNpcs(this.p.map)).forEach(n=>{ const vx=n.x-camX,vy=n.y-camY;
      if(vx>=0&&vx<VIEW&&vy>=0&&vy<VIEW){ ctx.font=`${t*0.62}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(n.emoji,vx*t+t/2,vy*t+t/2+1); } });
    // エルフ国の帰還の扉（出現中のみ）(6,8)に光るマーカー
    if(this.p.map==='elf' && this.p.flags.elfReturnDoor){
      const vx=6-camX, vy=8-camY;
      if(vx>=0&&vx<VIEW&&vy>=0&&vy<VIEW){
        const px=vx*t, py=vy*t, u=t/8;
        ctx.fillStyle='rgba(150,220,255,.85)'; ctx.fillRect(px+u, py, u*6, u*8);
        ctx.fillStyle='rgba(220,245,255,.95)'; ctx.fillRect(px+2*u, py+u, u*4, u*6);
        ctx.font=`${t*0.6}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🚪', px+t/2, py+t/2+1);
      }
    }
    // プレイヤー
    this.dotHero(ctx,half*t,half*t,t,this.p.dir,this.frame);
  },
  drawTile(ctx,ch,px,py,t,indoor,mx,my){
    const base = indoor?'#3a2f28':'#4a9d4f';
    ctx.fillStyle = ch==='~'?'#2f6fc4' : (ch==='#'?'#6a6258' : base);
    ctx.fillRect(px,py,t,t);
    const u=t/8;
    const dot=(c,arr)=>{ ctx.fillStyle=c; arr.forEach(([x,y,w=1,h=1])=>ctx.fillRect(px+x*u,py+y*u,w*u,h*u)); };
    if(ch==='~'){ dot('#5a92e0',[[1,1],[5,1],[3,3],[6,4],[2,5],[0,3],[4,6],[7,2]]); }
    else if(ch==='#'){ dot('#4f483f',[[0,2,8,1],[0,5,8,1],[2,0,1,2],[5,3,1,2],[1,6,1,2],[6,6,1,2]]); }
    else if(indoor){ dot('#2e251f',[[1,1],[5,2],[3,5],[6,6],[2,7],[7,3]]); }
    else { dot('#3d8442',[[1,1],[5,2],[3,4],[6,5],[2,6],[7,1]]); dot('#57b35c',[[2,2],[6,1],[4,5]]); }

    if(ch==='T'){ dot('#2e7d36',[[2,0,4,1],[1,1,6,3],[2,4,4,1]]); dot('#1f5e28',[[2,1],[5,2],[3,3]]); dot('#6b4a2a',[[3,5,2,3]]); }
    else if(ch==='M'){ dot('#8a8278',[[3,1,2,1],[2,2,4,1],[1,3,6,1],[1,4,6,2]]); dot('#6a625a',[[3,2],[2,4],[5,4],[4,5]]); dot('#b0a89a',[[3,1],[4,2]]); }
    else if(ch==='B'){ ctx.fillStyle='#7a5530'; ctx.fillRect(px,py,t,t); dot('#5a3d22',[[0,1,8,1],[0,3,8,1],[0,5,8,1],[0,7,8,1]]); }
    else if(ch==='>'){ dot('#2e251f',[[1,1,6,1],[2,2,5,1],[3,3,4,1],[4,4,3,1],[5,5,2,1]]); dot('#1a140f',[[1,2,1,5],[2,3,1,4]]); }
    else if(ch==='D'){ if(this.doorIsOpen()){ ctx.fillStyle=base; ctx.fillRect(px,py,t,t); dot('#2e251f',[[1,1],[5,2],[3,5]]); }
      else { dot('#6b4a2a',[[1,0,6,8]]); dot('#4a3018',[[1,0,1,8],[6,0,1,8],[3,0,2,1]]); dot('#d9b25b',[[5,4]]); } }
    else if(ch==='C'){
      if(this.p.map==='tower'){ // 塔の宝箱
        const opened=this.tower&&this.tower.opened&&this.tower.opened[mx+','+my];
        if(opened){ dot('#5a3a18',[[1,4,6,3]]); dot('#3a2410',[[1,3,6,1]]); }
        else this.dotChest(ctx,px,py,t);
      } else this.dotBuilding(ctx,px,py,t,'castle');
    }
    else if(ch==='V'){ this.dotBuilding(ctx,px,py,t,'town'); }
    else if(ch==='W'){ this.dotBuilding(ctx,px,py,t,'village'); }
    else if(ch==='E'){ this.dotBuilding(ctx,px,py,t,'cave'); }
    else if(ch==='O'){ this.dotBuilding(ctx,px,py,t,'tower'); }
    else if(ch==='P'){ this.dotBuilding(ctx,px,py,t,'jobcastle'); }
    else if(ch==='Y'){ // 枯れた世界樹
      dot('#4a3526',[[3,4,2,4]]);                       // みき
      dot('#6a4a32',[[2,5,1,2],[5,5,1,2]]);
      dot('#5a4030',[[1,1,2,1],[2,0,4,1],[5,1,2,1],[1,2,6,2]]); // 枯れ枝
      dot('#3a2818',[[2,2],[5,2],[3,3],[4,1]]);
    }
    else if(ch==='S'){ // 海の上の船
      ctx.fillStyle='#2f6fc4'; ctx.fillRect(px,py,t,t);          // 水
      dot('#5a92e0',[[1,1],[6,2],[2,6],[7,5]]);                  // 波
      dot('#6b4a2a',[[1,5,6,2]]);                                 // 船体
      dot('#4a3018',[[1,6,6,1]]);
      dot('#cfd6e0',[[4,1,1,4]]);                                 // マスト
      dot('#eef2f8',[[2,2,2,3],[5,2,2,3]]);                       // 帆
    }
    else if(ch==='X'){ // 湖に現れる裏ボスの洞窟（条件未達なら ただの水）
      if(this.abyssRevealed()){
        ctx.fillStyle='#2f6fc4'; ctx.fillRect(px,py,t,t);        // 水
        dot('#10131c',[[2,1,4,6],[1,2,6,4]]);                    // 黒い洞窟の口
        dot('#05070c',[[3,3,2,3]]);                               // 奥の闇
        dot('#3a4a6a',[[2,1,4,1]]);                               // 岩のふち
      } else {
        ctx.fillStyle='#2f6fc4'; ctx.fillRect(px,py,t,t);
        dot('#5a92e0',[[1,1],[6,2],[2,6],[7,5]]);                 // ただの波
      }
    }
  },
  dotBuilding(ctx,px,py,t,kind){
    const u=t/8;
    const d=(c,arr)=>{ ctx.fillStyle=c; arr.forEach(([x,y,w=1,h=1])=>ctx.fillRect(px+x*u,py+y*u,w*u,h*u)); };
    if(kind==='castle'){ d('#9a9288',[[1,2,6,6]]); d('#6a625a',[[1,1,1,1],[3,1,1,1],[5,1,1,1],[7,1,1,1]]);
      d('#3a322a',[[3,4,2,4]]); d('#d9b25b',[[3,2],[5,2]]); }
    else if(kind==='town'){ d('#b04030',[[1,2,6,2]]); d('#c85040',[[2,1,4,1]]); d('#c8b090',[[1,4,6,4]]);
      d('#5a3a22',[[3,5,2,3]]); d('#8de0e8',[[1,5],[6,5]]); }
    else if(kind==='village'){ d('#7a5a35',[[1,3,6,5]]); d('#9a7a45',[[1,2,6,1]]); d('#5a3a22',[[3,5,2,3]]);
      d('#c8a85a',[[2,3,1,1],[5,3,1,1]]); }
    else if(kind==='cave'){ d('#3a322a',[[1,2,6,6]]); d('#0a0806',[[2,4,4,4],[3,3,2,1]]); d('#5a524a',[[1,2,6,1]]); }
    else if(kind==='tower'){ d('#5a4a6a',[[2,0,4,8]]); d('#6a5a7a',[[1,1,1,1],[3,1,1,1],[5,1,1,1],[7,1,1,1]]);
      d('#3a2e4a',[[3,4,2,4]]); d('#b080e0',[[3,2],[3,5]]); d('#d9b25b',[[3,0,2,1]]); }
    else if(kind==='jobcastle'){ d('#c8a83a',[[1,2,6,6]]); d('#e8c84a',[[1,1,1,1],[3,1,1,1],[5,1,1,1],[7,1,1,1]]);
      d('#7a4ac8',[[3,4,2,4]]); d('#fff0a0',[[3,2],[5,2]]); d('#fff0a0',[[3,0,2,1]]); }
  },
  drawWarpTile(ctx,px,py,t,ch){
    const u=t/8;
    const d=(c,arr)=>{ ctx.fillStyle=c; arr.forEach(([x,y,w=1,h=1])=>ctx.fillRect(px+x*u,py+y*u,w*u,h*u)); };
    if(ch==='>'){
      // 階段：水色の縁取りで「切替タイル」と分かるように
      d('rgba(120,210,255,.9)',[[0,0,8,1],[0,7,8,1],[0,0,1,8],[7,0,1,8]]);
    } else if('VWEOPC'.includes(ch)){
      // フィールド上の建物入口：水色の枠で囲って入れると分かるように
      d('rgba(120,210,255,.85)',[[0,0,8,1],[0,7,8,1],[0,0,1,8],[7,0,1,8]]);
    } else {
      // 屋内の出入口マット：水色の床にする
      ctx.fillStyle='#1f5a6e'; ctx.fillRect(px,py,t,t);
      d('#3fa8c8',[[1,1,6,1],[1,6,6,1],[1,1,1,6],[6,1,1,6]]);
      d('#7fe0f0',[[3,3,2,2]]);
    }
  },
  dotChest(ctx,px,py,t){ const u=t/8;
    const d=(c,arr)=>{ ctx.fillStyle=c; arr.forEach(([x,y,w=1,h=1])=>ctx.fillRect(px+x*u,py+y*u,w*u,h*u)); };
    d('#8a5a2a',[[1,3,6,4]]); d('#d9b25b',[[1,2,6,1],[1,4,6,1]]); d('#5a3a18',[[1,3,6,1]]);
    d('#fff0b0',[[3,4,2,1]]); d('#3a2410',[[3,5,2,2]]);
  },
  // 武器ごとの刃の色（noneは武器なし＝剣を描かない）
  bladeColor(){
    const w=this.p.equip.weapon;
    return ({
      copper:'#c98a3a', steel:'#cfd6e0', flameswd:'#ff7a3c',
      excalibur:'#ffe27a', twig:'#9a6a33', balmung:'#eaf2ff',
      branch:'#7a5226', almace:'#fff4b0',
    })[w] || null;   // none や未定義は null＝剣なし
  },
  dotHero(ctx,px,py,t,dir,frame){
    const u=t/8;
    const d=(c,arr)=>{ ctx.fillStyle=c; arr.forEach(([x,y,w=1,h=1])=>ctx.fillRect(px+x*u,py+y*u,w*u,h*u)); };
    const hair='#7a4a1a', skin='#e8b890', body='#3a6ad0', boot='#caa030';
    const blade=this.bladeColor(), hasW=!!blade, hilt='#caa030';
    // 影
    ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(px+2*u,py+7.3*u,4*u,0.6*u);
    if(dir==='up'){ d(hair,[[2,0,4,2],[2,2,4,1]]); d(body,[[2,3,4,3]]); d('#2a4aa0',[[3,3,2,2]]);
      // 上向き：右肩に剣を立てて背負う
      if(hasW){ d(hilt,[[6,4,1,1]]); d(blade,[[6,0,1,4]]); } }
    else if(dir==='down'){ d(hair,[[2,0,4,1]]); d(skin,[[2,1,4,2]]); d('#1a1008',[[3,2],[4,2]]);
      d(body,[[2,3,4,3]]); d('#8090c0',[[3,3,2,1]]);
      // 下向き：右手に剣を下げて持つ
      if(hasW){ d(hilt,[[6,3,1,1]]); d(blade,[[6,4,1,3]]); } }
    else { const lf=dir==='left';
      d(hair,[[2,0,4,1]]); d(skin,[[2,1,4,2]]);
      d('#1a1008',[[lf?2:5,2]]); d(body,[[2,3,4,3]]);
      // 横向き：進行方向に剣を構える（武器装備時のみ）
      if(hasW){ const bx=lf?0:7; d(hilt,[[lf?1:6,3,1,1]]); d(blade,[[bx,1,1,4]]); } }
    // 足（歩行アニメ）
    if(frame===0){ d(boot,[[2,6,2,1],[4,6,2,1]]); }
    else { d(boot,[[2,6,2,1],[4,5,2,1]]); }
  },

  updateStrip(){ const p=this.p;
    document.getElementById('sGold').textContent=p.gold;
    const wrap=document.getElementById('partyStrip'); if(!wrap) return;
    const units=[{name:'ゆうしゃ',lv:p.lv,hp:p.hp,maxHp:p.maxHp,mp:p.mp,maxMp:p.maxMp}];
    p.party.forEach(key=>{ const st=p.allyState[key]; const a=ALLIES[key];
      units.push({name:a.name,lv:st.lv,hp:st.hp,maxHp:st.maxHp,mp:st.mp,maxMp:st.maxMp,
                  noVitals:!!(a.noVitals||st.noVitals)}); });
    wrap.innerHTML=units.map(u=>{
      if(u.noVitals){
        const g=Math.max(0,Math.min(300,p.loveGauge||0));
        const lvl=p.loveLevel||100;
        const barPct=Math.min(100, (g% 100===0&&g>0)?100:(g%100));   // 現在の段の進捗
        const ready = g>=lvl;
        return `<div class="ps-unit ps-love" id="psPrincess"><div class="ps-name">${u.name} <span class="ps-lv">♪</span></div>`
          +`<div><span class="ps-hp" style="background:#c45a9a">あい</span> ${g}% <span class="love-thr${ready?' ready':''}">[${lvl}%]</span></div>`
          +`<div class="hbar lovebar"><i style="width:${Math.min(100,g/3)}%"></i></div></div>`;
      }
      const hpPct=Math.max(0,u.hp)/u.maxHp*100, mpPct=u.maxMp?u.mp/u.maxMp*100:0;
      const mpLine=u.maxMp>0?`<div><span class="ps-mp">MP</span> ${u.mp}/${u.maxMp}</div><div class="hbar mp"><i style="width:${mpPct}%"></i></div>`:'';
      return `<div class="ps-unit${u.hp<=0?' downed':''}"><div class="ps-name">${u.name} <span class="ps-lv">Lv${u.lv}</span></div><div><span class="ps-hp">HP</span> ${Math.max(0,u.hp)}/${u.maxHp}</div><div class="hbar hp"><i style="width:${hpPct}%"></i></div>${mpLine}</div>`;
    }).join('');
    // 姫の枠をタップ/クリックで しきい値(100/200/300)を切替
    const pp=document.getElementById('psPrincess');
    if(pp){ pp.style.cursor='pointer'; pp.onclick=()=>this.cycleLoveLevel(); }
  },
  pick(a){ return a[Math.floor(Math.random()*a.length)]; },
  randi(a,b){ return a+Math.floor(Math.random()*(b-a+1)); },
  giveItem(k,n){ this.p.items[k]=(this.p.items[k]||0)+n; },
  toast(msg){ let t=document.getElementById('_toast');
    if(!t){ t=document.createElement('div'); t.id='_toast';
      t.style.cssText='position:absolute;left:50%;top:14px;transform:translateX(-50%);background:#000;border:2px solid #fff;border-radius:6px;padding:6px 14px;font-size:13px;z-index:40;transition:.3s;opacity:0;';
      document.getElementById('app').appendChild(t); }
    t.textContent=msg; t.style.opacity='1';
    clearTimeout(this._tt); this._tt=setTimeout(()=>t.style.opacity='0',1600);
  },
};

game.init();
</script>
